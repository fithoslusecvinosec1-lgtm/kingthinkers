<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KingThinkers — Teacher Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B0B1E;--navy2:#13132A;--card:#1C1C3A;
  --gold:#F5A800;--amber:#FF6B1A;--green:#00C48C;
  --sky:#38BDF8;--red:#FF4757;
  --white:#FFFFFF;--muted:#8080A8;--border:rgba(255,255,255,0.08);
  --f-d:"Baloo 2",cursive;--f-b:"Nunito",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--navy);font-family:var(--f-b);color:var(--white);}

#topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.t-logo{font-family:var(--f-d);font-size:15px;font-weight:900;color:var(--gold);}
.t-link{padding:7px 12px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);background:transparent;text-decoration:none;display:inline-block;}
.t-link.gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:900;}

#tab-nav{background:var(--navy2);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:45px;z-index:49;}
#tab-nav::-webkit-scrollbar{display:none;}
#tab-nav a{flex-shrink:0;padding:12px 14px;font-size:12px;font-weight:800;color:var(--muted);text-decoration:none;white-space:nowrap;display:block;border-bottom:2px solid transparent;margin-bottom:-2px;}

.section{padding:16px 14px 24px;}
.section+.section{border-top:1px solid var(--border);}
.sh{font-family:var(--f-d);font-size:18px;font-weight:900;color:var(--gold);margin-bottom:14px;}

.lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.inp{background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-family:var(--f-b);font-size:14px;color:var(--white);width:100%;display:block;outline:none;-webkit-appearance:none;margin-bottom:10px;}
.inp:focus{border-color:rgba(245,168,0,.5);}
textarea.inp{min-height:110px;resize:vertical;}

.add-btn{display:block;width:100%;background:linear-gradient(135deg,var(--gold),var(--amber));border:none;border-radius:12px;padding:15px;font-family:var(--f-d);font-size:16px;font-weight:900;color:#000;margin-top:6px;-webkit-appearance:none;}

.stat-row{display:flex;gap:10px;margin-bottom:14px;}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-n{font-family:var(--f-d);font-size:22px;font-weight:900;color:var(--gold);}
.stat-l{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;}

.s-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.s-code{font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--gold);background:rgba(245,168,0,.1);border:1px solid rgba(245,168,0,.2);border-radius:8px;padding:6px 10px;flex-shrink:0;min-width:58px;text-align:center;}
.s-info{flex:1;min-width:0;}
.s-name{font-weight:800;font-size:15px;}
.s-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.s-btns{display:flex;gap:6px;}
.s-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:16px;display:flex;align-items:center;justify-content:center;}
.s-btn.grn{background:rgba(0,196,140,.1);border-color:rgba(0,196,140,.3);}

.p-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.p-bar-bg{background:rgba(255,255,255,.06);border-radius:100px;height:8px;overflow:hidden;margin:8px 0;}
.p-bar-fg{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:100px;}

.kg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.kc{background:linear-gradient(135deg,#0B0B1E,#1A1A3A);border:2px solid var(--gold);border-radius:14px;padding:14px;text-align:center;}
.kc-crown{font-size:24px;}.kc-brand{font-size:8px;font-weight:900;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin:4px 0;}
.kc-name{font-family:var(--f-d);font-size:13px;font-weight:900;margin:6px 0;}
.kc-div{height:1px;background:rgba(245,168,0,.3);margin:6px 0;}
.kc-lbl{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.1em;}
.kc-code{font-family:var(--f-d);font-size:26px;font-weight:900;color:var(--gold);letter-spacing:.2em;}
.kc-gr{font-size:10px;color:var(--muted);margin-top:4px;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-i{font-size:44px;margin-bottom:10px;}

.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:var(--f-d);font-size:17px;font-weight:900;color:var(--gold);margin-bottom:12px;}
.modal-close{display:block;width:100%;margin-top:14px;background:var(--gold);border:none;border-radius:10px;padding:13px;font-family:var(--f-d);font-size:14px;font-weight:900;color:#000;}

.m-check{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--navy2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.m-check input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);flex-shrink:0;}
.m-info{flex:1;}.m-name{font-size:13px;font-weight:700;}.m-meta{font-size:10px;color:var(--muted);}
.m-world{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 5px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.ghost-btn{display:block;width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:var(--f-b);font-size:13px;font-weight:700;color:var(--muted);margin-top:8px;}
.danger-btn{display:block;width:100%;background:transparent;border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:12px;font-family:var(--f-b);font-size:13px;font-weight:700;color:var(--red);margin-top:8px;}

@media print{
  #topbar,#tab-nav,#toast,#card-modal,#prog-modal,.s-btns,.add-btn,.ghost-btn,.danger-btn{display:none!important;}
  .kg{display:grid!important;}
  .kc{break-inside:avoid;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="t-logo">👑 Teacher Roster</div>
  <div style="display:flex;gap:8px;">
    <button class="t-link" onclick="window.print()">🖨️ Print</button>
    <a class="t-link gold" href="/kingthinkers/kingthinkers-dashboard.html">👦 Student View</a>
  </div>
</div>

<div id="tab-nav">
  <a href="#roster">📋 Roster</a>
  <a href="#progress">📊 Progress</a>
  <a href="#codes">🔑 King Codes</a>
  <a href="#add">➕ Add Student</a>
  <a href="#settings">⚙️ Settings</a>
</div>

<!-- ROSTER -->
<div class="section" id="roster">
  <div class="sh">📋 Class Roster</div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-n" id="st-count">0</div><div class="stat-l">Students</div></div>
    <div class="stat-box"><div class="stat-n" id="st-active">0</div><div class="stat-l">Active</div></div>
    <div class="stat-box"><div class="stat-n" id="st-xp">0</div><div class="stat-l">Total XP</div></div>
  </div>
  <input type="text" id="search" class="inp" placeholder="Search students…" oninput="renderRoster()">
  <div id="roster-list"></div>
</div>

<!-- PROGRESS -->
<div class="section" id="progress">
  <div class="sh">📊 Progress Overview</div>
  <div id="prog-list"></div>
</div>

<!-- KING CODES -->
<div class="section" id="codes">
  <div class="sh">🔑 King Codes</div>
  <button class="add-btn" onclick="window.print()" style="margin-bottom:14px;">🖨️ Print All King Cards</button>
  <div class="kg" id="codes-grid"></div>
</div>

<!-- ADD STUDENT -->
<div class="section" id="add">
  <div class="sh">➕ Add a Student</div>
  <label class="lbl">Student Name</label>
  <input type="text" id="f-name" class="inp" placeholder="First name" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="words">
  <label class="lbl">Grade</label>
  <select id="f-grade" class="inp">
    <option value="K">Kindergarten</option>
    <option value="1">1st Grade</option>
    <option value="2">2nd Grade</option>
    <option value="3" selected>3rd Grade</option>
    <option value="4">4th Grade</option>
    <option value="5">5th Grade</option>
  </select>
  <button class="add-btn" id="add-btn">Add King 👑</button>

  <div style="margin-top:28px;">
    <div class="sh" style="font-size:16px;">📥 Bulk Add</div>
    <label class="lbl">One name per line. Add grade after comma: Marcus, 3</label>
    <textarea id="bulk-names" class="inp" placeholder="Marcus&#10;Jaylen, 4&#10;Kofi, 2&#10;Amari&#10;Zion, 5"></textarea>
    <button class="add-btn" id="bulk-btn">Add All Students</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="section" id="settings">
  <div class="sh">⚙️ Settings</div>
  <label class="lbl">Teacher Name</label>
  <input type="text" id="s-teacher" class="inp" placeholder="e.g. Mr. Johnson">
  <label class="lbl">Class Code</label>
  <input type="text" id="s-class" class="inp" placeholder="e.g. MR-JOHNSON-3B">
  <label class="lbl">School Name</label>
  <input type="text" id="s-school" class="inp" placeholder="e.g. MLK Elementary">
  <button class="ghost-btn" id="save-settings-btn">Save Settings ✓</button>
  <button class="ghost-btn" id="sample-btn">🧪 Load Sample Class</button>
  <button class="danger-btn" id="clear-btn">🗑️ Reset All Data</button>
</div>

<!-- CARD MODAL -->
<div class="modal-bg" id="card-modal">
  <div class="modal-box">
    <div class="modal-title">👑 King Card</div>
    <div id="card-body"></div>
    <button class="modal-close" id="card-close-btn">Close</button>
  </div>
</div>

<!-- PROGRESS MODAL -->
<div class="modal-bg" id="prog-modal">
  <div class="modal-box">
    <div class="modal-title">📊 <span id="pm-name">Student</span>'s Progress</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Check off completed missions.</p>
    <div id="pm-list"></div>
    <button class="modal-close" id="prog-close-btn">Done ✓</button>
  </div>
</div>

<div id="toast">✓</div>

<script>
var _progCode = null;

// ── STORAGE ───────────────────────────────────────────────────
function getRoster(){try{return JSON.parse(localStorage.getItem('kt_roster')||'{}')}catch(e){return{}}}
function saveRoster(r){localStorage.setItem('kt_roster',JSON.stringify(r))}
function getStudent(c){try{return JSON.parse(localStorage.getItem('kt_student_'+c)||'null')}catch(e){return null}}
function saveStudent(c,s){localStorage.setItem('kt_student_'+c,JSON.stringify(s))}
function getSettings(){try{return JSON.parse(localStorage.getItem('kt_settings')||'{}')}catch(e){return{}}}
function putSetting(k,v){var s=getSettings();s[k]=v;localStorage.setItem('kt_settings',JSON.stringify(s))}
function getDevProg(c){try{return JSON.parse(localStorage.getItem('kt_quest_progress_'+c)||'{}')}catch(e){return{}}}
function getManProg(c){try{return JSON.parse(localStorage.getItem('kt_manual_'+c)||'{}')}catch(e){return{}}}
function saveManProg(c,p){localStorage.setItem('kt_manual_'+c,JSON.stringify(p))}
function getMerged(c){return Object.assign({},getManProg(c),getDevProg(c))}

var MISSIONS=[
  {id:'e1',name:"The Pharaoh's Secret",world:'Egypt',type:'Reading',xp:40},
  {id:'e2',name:'Hieroglyph Numbers',world:'Egypt',type:'Math',xp:35},
  {id:'e3',name:"The Nile's Gift",world:'Egypt',type:'Reading',xp:40},
  {id:'e4',name:'Pyramid Fractions',world:'Egypt',type:'Math',xp:35},
  {id:'n1',name:'Warriors of the South',world:'Nubia',type:'Reading',xp:40},
  {id:'n2',name:'Trade Route Math',world:'Nubia',type:'Math',xp:35},
  {id:'n3',name:'The Black Pharaohs',world:'Nubia',type:'Reading',xp:40},
  {id:'n4',name:'Archery Angles',world:'Nubia',type:'Math',xp:35},
];

function genCode(){
  var used=Object.keys(getRoster());
  var code;
  do{code=String(Math.floor(1000+Math.random()*9000))}while(used.indexOf(code)>-1);
  return code;
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

function getWorld(c){
  var done=Object.keys(getMerged(c)).length;
  if(done<4)return'Egypt';if(done<8)return'Nubia';return'Kush+';
}

// ── ADD ───────────────────────────────────────────────────────
function doAdd(){
  var name=document.getElementById('f-name').value.trim();
  var grade=document.getElementById('f-grade').value;
  if(!name){toast('Enter a name first');return}
  var code=genCode();
  var s={code:code,name:name,grade:grade,classCode:'MY-CLASS',xp:0,crowns:0,createdAt:Date.now()};
  saveStudent(code,s);
  var r=getRoster();r[code]={name:name,grade:grade};saveRoster(r);
  document.getElementById('f-name').value='';
  toast('King '+name+' added! Code: '+code);
  renderAll();
}

function doBulk(){
  var raw=document.getElementById('bulk-names').value.trim();
  if(!raw){toast('Paste names first');return}
  var lines=raw.split('\n');var added=0;
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var parts=line.split(',');
    var name=parts[0].trim();var grade=parts[1]?parts[1].trim():'3';
    if(!name)continue;
    var code=genCode();
    var s={code:code,name:name,grade:grade,classCode:'MY-CLASS',xp:0,crowns:0,createdAt:Date.now()};
    saveStudent(code,s);
    var r=getRoster();r[code]={name:name,grade:grade};saveRoster(r);
    added++;
  }
  document.getElementById('bulk-names').value='';
  toast(added+' students added!');renderAll();
}

function removeStudent(code){
  if(!confirm('Remove '+code+'?'))return;
  var r=getRoster();delete r[code];saveRoster(r);
  localStorage.removeItem('kt_student_'+code);
  toast('Removed');renderAll();
}

// ── RENDER ────────────────────────────────────────────────────
function renderRoster(){
  var r=getRoster();var codes=Object.keys(r);
  var search=(document.getElementById('search').value||'').toLowerCase();
  var totalXP=0,active=0;
  codes.forEach(function(c){var s=getStudent(c);if(s){totalXP+=(s.xp||0);if(s.xp>0)active++}});
  document.getElementById('st-count').textContent=codes.length;
  document.getElementById('st-active').textContent=active;
  document.getElementById('st-xp').textContent=totalXP;
  var list=document.getElementById('roster-list');
  if(!codes.length){list.innerHTML='<div class="empty"><div class="empty-i">👥</div><div>No students — use Add Student below</div></div>';return}
  var filtered=codes.filter(function(c){var s=getStudent(c);if(!s)return false;return!search||s.name.toLowerCase().indexOf(search)>-1||c.indexOf(search)>-1});
  list.innerHTML=filtered.map(function(c){
    var s=getStudent(c);if(!s)return'';
    var p=getMerged(c);var done=MISSIONS.filter(function(m){return!!p[m.id]}).length;
    return'<div class="s-card">'+
      '<div class="s-code">'+c+'</div>'+
      '<div class="s-info"><div class="s-name">'+s.name+'</div><div class="s-meta">Gr '+s.grade+' · '+getWorld(c)+' · '+done+'/8 · '+(s.xp||0)+' XP</div></div>'+
      '<div class="s-btns">'+
        '<button class="s-btn grn" onclick="showProg(\''+c+'\')">📊</button>'+
        '<button class="s-btn" onclick="showCard(\''+c+'\')">🃏</button>'+
        '<button class="s-btn" onclick="removeStudent(\''+c+'\')">🗑️</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderProgress(){
  var r=getRoster();var codes=Object.keys(r);
  var el=document.getElementById('prog-list');
  if(!codes.length){el.innerHTML='<div class="empty"><div class="empty-i">📊</div><div>Add students, then tap 📊 to track progress</div></div>';return}
  var data=codes.map(function(c){
    var s=getStudent(c);var p=getMerged(c);
    var done=MISSIONS.filter(function(m){return!!p[m.id]}).length;
    var xp=MISSIONS.filter(function(m){return!!p[m.id]}).reduce(function(sum,m){return sum+m.xp},0);
    return{c:c,s:s,done:done,xp:xp,p:p};
  }).filter(function(d){return d.s}).sort(function(a,b){return b.done-a.done});
  el.innerHTML=data.map(function(d,i){
    var pct=Math.round(d.done/MISSIONS.length*100);
    var medal=(i===0&&d.done>0)?'🥇':(i===1&&d.done>0)?'🥈':(i===2&&d.done>0)?'🥉':'👑';
    var names=MISSIONS.filter(function(m){return!!d.p[m.id]}).map(function(m){return m.name});
    return'<div class="p-card" onclick="showProg(\''+d.c+'\')">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;">'+
        '<div style="display:flex;align-items:center;gap:10px;"><span style="font-size:20px;">'+medal+'</span>'+
          '<div><div style="font-weight:800;font-size:14px;">'+d.s.name+'</div>'+
          '<div style="font-size:11px;color:var(--muted);">Gr '+d.s.grade+' · '+d.done+'/8 missions</div></div></div>'+
        '<div style="text-align:right;"><div style="font-family:var(--f-d);font-size:16px;font-weight:900;color:var(--gold);">'+d.xp+' XP</div>'+
        '<div style="font-size:10px;color:var(--muted);">'+pct+'%</div></div>'+
      '</div>'+
      '<div class="p-bar-bg"><div class="p-bar-fg" style="width:'+pct+'%"></div></div>'+
      (names.length?'<div style="font-size:10px;color:var(--green);line-height:1.7;">✅ '+names.join(' · ')+'</div>':'')+
    '</div>';
  }).join('');
}

function renderCodes(){
  var r=getRoster();var codes=Object.keys(r);
  var g=document.getElementById('codes-grid');
  if(!codes.length){g.innerHTML='<div class="empty"><div class="empty-i">🔑</div><div>No codes yet</div></div>';return}
  g.innerHTML=codes.map(function(c){
    var s=getStudent(c);if(!s)return'';
    return'<div class="kc" onclick="showCard(\''+c+'\')">'+
      '<div class="kc-crown">👑</div><div class="kc-brand">KINGTHINKERS</div>'+
      '<div class="kc-name">King '+s.name+'</div><div class="kc-div"></div>'+
      '<div class="kc-lbl">King Code</div><div class="kc-code">'+c+'</div>'+
      '<div class="kc-gr">Grade '+s.grade+'</div></div>';
  }).join('');
}

function renderAll(){renderRoster();renderProgress();renderCodes();}

// ── MODALS ────────────────────────────────────────────────────
function showCard(code){
  var s=getStudent(code);if(!s)return;
  document.getElementById('card-body').innerHTML=
    '<div class="kc" style="max-width:220px;margin:0 auto;">'+
    '<div class="kc-crown">👑</div><div class="kc-brand">KINGTHINKERS</div>'+
    '<div class="kc-name">King '+s.name+'</div><div class="kc-div"></div>'+
    '<div class="kc-lbl">King Code</div><div class="kc-code">'+code+'</div>'+
    '<div class="kc-gr">Grade '+s.grade+'</div></div>';
  document.getElementById('card-modal').classList.add('open');
}

function showProg(code){
  _progCode=code;
  var s=getStudent(code);if(!s)return;
  document.getElementById('pm-name').textContent=s.name;
  var p=getMerged(code);
  var worlds={};
  MISSIONS.forEach(function(m){if(!worlds[m.world])worlds[m.world]=[];worlds[m.world].push(m)});
  var html='';
  Object.keys(worlds).forEach(function(w){
    html+='<div class="m-world">⚔️ '+w+'</div>';
    worlds[w].forEach(function(m){
      var done=!!p[m.id];
      html+='<label class="m-check">'+
        '<input type="checkbox" '+(done?'checked':'')+' data-id="'+m.id+'" data-xp="'+m.xp+'">'+
        '<div class="m-info"><div class="m-name">'+m.name+'</div><div class="m-meta">'+m.type+' · +'+m.xp+' XP</div></div>'+
        (done?'<span style="color:var(--green);">✅</span>':'')+
      '</label>';
    });
  });
  document.getElementById('pm-list').innerHTML=html;
  document.querySelectorAll('#pm-list input[type=checkbox]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var id=cb.getAttribute('data-id');var xp=parseInt(cb.getAttribute('data-xp'));
      var manual=getManProg(_progCode);var st=getStudent(_progCode);
      if(cb.checked){manual[id]={completedAt:Date.now()};if(st){st.xp=(st.xp||0)+xp;saveStudent(_progCode,st)}}
      else{delete manual[id];if(st){st.xp=Math.max(0,(st.xp||0)-xp);saveStudent(_progCode,st)}}
      saveManProg(_progCode,manual);toast('Saved!');
    });
  });
  document.getElementById('prog-modal').classList.add('open');
}

// ── SETTINGS ──────────────────────────────────────────────────
function loadSettingsForm(){
  var s=getSettings();
  if(s.teacherName)document.getElementById('s-teacher').value=s.teacherName;
  if(s.classCode)document.getElementById('s-class').value=s.classCode;
  if(s.schoolName)document.getElementById('s-school').value=s.schoolName;
}

// ── WIRE BUTTONS ─────────────────────────────────────────────
window.addEventListener('load',function(){
  document.getElementById('add-btn').addEventListener('click',doAdd);
  document.getElementById('bulk-btn').addEventListener('click',doBulk);
  document.getElementById('card-close-btn').addEventListener('click',function(){document.getElementById('card-modal').classList.remove('open')});
  document.getElementById('prog-close-btn').addEventListener('click',function(){document.getElementById('prog-modal').classList.remove('open');renderAll()});
  document.getElementById('save-settings-btn').addEventListener('click',function(){
    putSetting('teacherName',document.getElementById('s-teacher').value);
    putSetting('classCode',document.getElementById('s-class').value);
    putSetting('schoolName',document.getElementById('s-school').value);
    toast('Settings saved!');
  });
  document.getElementById('sample-btn').addEventListener('click',function(){
    if(!confirm('Load 5 sample students?'))return;
    [['Marcus','3'],['Jaylen','4'],['Kofi','3'],['Amari','2'],['Zion','5']].forEach(function(n){
      var code=genCode();
      var s={code:code,name:n[0],grade:n[1],classCode:'DEMO',xp:0,crowns:0,createdAt:Date.now()};
      saveStudent(code,s);var r=getRoster();r[code]={name:n[0],grade:n[1]};saveRoster(r);
    });
    toast('Sample class loaded!');renderAll();
  });
  document.getElementById('clear-btn').addEventListener('click',function(){
    if(!confirm('Delete ALL data?'))return;
    var r=getRoster();Object.keys(r).forEach(function(c){localStorage.removeItem('kt_student_'+c)});
    localStorage.removeItem('kt_roster');toast('All data cleared');renderAll();
  });
  renderAll();
  loadSettingsForm();
});
</script>
