<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KingThinkers — Teacher Roster v4</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B0B1E;--navy2:#13132A;--card:#1C1C3A;
  --gold:#F5A800;--amber:#FF6B1A;--green:#00C48C;
  --sky:#38BDF8;--red:#FF4757;
  --white:#FFFFFF;--muted:#8080A8;--border:rgba(255,255,255,0.08);
  --f-d:"Baloo 2",cursive;--f-b:"Nunito",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--navy);font-family:var(--f-b);color:var(--white);}

/* TOPBAR */
#topbar{
  position:sticky;top:0;z-index:100;
  background:var(--navy2);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
}
.t-logo{font-family:var(--f-d);font-size:15px;font-weight:900;color:var(--gold);}
.tbtn{
  padding:7px 12px;border-radius:8px;border:1px solid var(--border);
  font-family:var(--f-b);font-size:12px;font-weight:700;color:var(--muted);
  background:transparent;cursor:pointer;display:inline-block;text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.tbtn.gold{background:var(--gold);border-color:var(--gold);color:#000;}

/* TAB NAV - using anchor links, no JS needed */
#tab-nav{
  position:sticky;top:49px;z-index:99;
  background:var(--navy2);border-bottom:2px solid var(--border);
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
#tab-nav::-webkit-scrollbar{display:none;}
#tab-nav a{
  flex-shrink:0;padding:12px 16px;
  font-family:var(--f-b);font-size:12px;font-weight:800;
  color:var(--muted);text-decoration:none;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  white-space:nowrap;display:block;
  -webkit-tap-highlight-color:transparent;
}
#tab-nav a:active{background:rgba(245,168,0,.1);color:var(--gold);}

/* SECTIONS */
.section{padding:16px;border-bottom:3px solid var(--gold);margin-bottom:0;}
.section-title{
  font-family:var(--f-d);font-size:18px;font-weight:900;color:var(--gold);
  margin-bottom:14px;padding-top:4px;
}

/* FORMS */
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block;}
.form-input,.form-select,.bulk-area{
  background:var(--navy2);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:var(--f-b);font-size:14px;font-weight:600;
  color:var(--white);outline:none;width:100%;
  -webkit-appearance:none;
}
.form-input:focus,.form-select:focus,.bulk-area:focus{border-color:rgba(245,168,0,.4);}
.bulk-area{min-height:120px;resize:vertical;}
.btn-add-king{display:block;background:linear-gradient(135deg,#F5A800,#FF6B1A);border:none;border-radius:10px;padding:14px 20px;font-family:var(--f-d);font-size:15px;font-weight:900;color:#000;cursor:pointer;width:100%;text-align:center;-webkit-tap-highlight-color:transparent;margin-top:10px;}
.btn-primary{
  display:inline-block;
  background:linear-gradient(135deg,var(--gold),var(--amber));border:none;
  border-radius:10px;padding:12px 20px;font-family:var(--f-d);font-size:14px;
  font-weight:900;color:#000;cursor:pointer;width:100%;text-align:center;
  -webkit-tap-highlight-color:transparent;margin-top:8px;
}
.btn-secondary{
  display:inline-block;
  background:transparent;border:1px solid var(--border);
  border-radius:10px;padding:10px 16px;font-family:var(--f-b);font-size:13px;
  font-weight:700;color:var(--muted);cursor:pointer;
  -webkit-tap-highlight-color:transparent;margin-top:6px;width:100%;text-align:center;
}

/* STATS */
.stat-row{display:flex;gap:10px;margin-bottom:14px;}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-val{font-family:var(--f-d);font-size:22px;font-weight:900;color:var(--gold);}
.stat-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;}

/* STUDENT CARDS */
.student-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
}
.student-code{
  font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--gold);
  background:rgba(245,168,0,.1);border:1px solid rgba(245,168,0,.2);
  border-radius:8px;padding:6px 10px;flex-shrink:0;min-width:58px;text-align:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.student-info{flex:1;min-width:0;}
.student-name{font-weight:800;font-size:15px;}
.student-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.student-btns{display:flex;gap:6px;flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:transparent;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.icon-btn.green{background:rgba(0,196,140,.1);border-color:rgba(0,196,140,.25);}

/* PROGRESS CARDS */
.progress-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.prog-bar{background:rgba(255,255,255,.06);border-radius:100px;height:8px;overflow:hidden;margin:8px 0;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:100px;}

/* KING CARDS */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.king-card{
  background:linear-gradient(135deg,#0B0B1E,#1A1A3A);
  border:2px solid var(--gold);border-radius:14px;padding:14px;text-align:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.kc-crown{font-size:24px;margin-bottom:4px;}
.kc-brand{font-size:8px;font-weight:900;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;}
.kc-name{font-family:var(--f-d);font-size:13px;font-weight:900;color:var(--white);margin:6px 0;}
.kc-divider{height:1px;background:rgba(245,168,0,.3);margin:6px 0;}
.kc-label{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.1em;}
.kc-code{font-family:var(--f-d);font-size:26px;font-weight:900;color:var(--gold);letter-spacing:.2em;}
.kc-grade{font-size:10px;color:var(--muted);margin-top:4px;}

/* MISSION CHECKLIST */
.mission-group-title{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px;}
.mission-check{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;background:var(--navy2);border:1px solid var(--border);
  border-radius:10px;margin-bottom:6px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.mission-check input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);flex-shrink:0;}
.mission-check-info{flex:1;}
.mission-check-name{font-size:13px;font-weight:700;}
.mission-check-meta{font-size:10px;color:var(--muted);}

/* MODAL */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.8);align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex;}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;
}
.modal-title{font-family:var(--f-d);font-size:17px;font-weight:900;color:var(--gold);margin-bottom:12px;}
.modal-close{
  display:block;width:100%;margin-top:14px;
  background:var(--gold);border:none;border-radius:10px;
  padding:12px;font-family:var(--f-d);font-size:14px;font-weight:900;
  color:#000;cursor:pointer;-webkit-tap-highlight-color:transparent;
}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:700;
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:10px;}

@media print{
  #topbar,#tab-nav,#toast,.modal-bg,.icon-btn,.tbtn,.no-print{display:none!important;}
  .section{border:none;}
  .cards-grid{display:grid!important;grid-template-columns:1fr 1fr;}
  .king-card{break-inside:avoid;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="t-logo">👑 Teacher Roster</div>
  <div style="display:flex;gap:8px;">
    <button class="tbtn" onclick="window.print()">🖨️ Print</button>
    <a class="tbtn gold" href="/kingthinkers/kingthinkers-dashboard.html">👦 Student View</a>
  </div>
</div>

<div id="tab-nav">
  <a href="#roster">📋 Roster</a>
  <a href="#progress">📊 Progress</a>
  <a href="#codes">🔑 King Codes</a>
  <a href="#add">➕ Add Student</a>
  <a href="#settings">⚙️ Settings</a>
</div>

<!-- ROSTER SECTION -->
<div class="section" id="roster">
  <div class="section-title">📋 Class Roster</div>
  <div class="stat-row" id="roster-stats">
    <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Students</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-active">0</div><div class="stat-lbl">Active</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-xp">0</div><div class="stat-lbl">Total XP</div></div>
  </div>
  <input class="form-input" id="search" type="text" placeholder="🔍 Search students…" oninput="renderRoster()" style="margin-bottom:12px;">
  <div id="roster-list"></div>
</div>

<!-- PROGRESS SECTION -->
<div class="section" id="progress">
  <div class="section-title">📊 Progress Overview</div>
  <div id="progress-content"></div>
</div>

<!-- KING CODES SECTION -->
<div class="section" id="codes">
  <div class="section-title">🔑 King Codes</div>
  <button class="btn-primary" onclick="window.print()" style="margin-bottom:14px;">🖨️ Print All King Cards</button>
  <div class="cards-grid" id="codes-grid"></div>
</div>

<!-- ADD STUDENT SECTION -->
<div class="section" id="add">
  <div class="section-title">➕ Add Students</div>
  <div class="form-group">
    <label class="form-label">Student Name</label>
    <input class="form-input" id="f-name" type="text" placeholder="First name" maxlength="20">
  </div>
  <div class="form-group">
    <label class="form-label">Grade</label>
    <select class="form-select" id="f-grade">
      <option value="K">Kindergarten</option>
      <option value="1">1st Grade</option>
      <option value="2">2nd Grade</option>
      <option value="3" selected>3rd Grade</option>
      <option value="4">4th Grade</option>
      <option value="5">5th Grade</option>
    </select>
  </div>
  <button class="btn-add-king" onclick="addStudent()">Add King 👑</button>

  <div style="margin-top:24px;">
    <div class="section-title" style="font-size:15px;">📥 Bulk Add</div>
    <div class="form-group">
      <label class="form-label">One name per line. Add grade after comma: Marcus, 3</label>
      <textarea class="bulk-area" id="bulk-names" placeholder="Marcus&#10;Jaylen, 4&#10;Kofi, 2&#10;Amari&#10;Zion, 5"></textarea>
    </div>
    <button class="btn-add-king" onclick="bulkAdd()">Add All Students</button>
  </div>
</div>

<!-- SETTINGS SECTION -->
<div class="section" id="settings">
  <div class="section-title">⚙️ Settings</div>
  <div class="form-group">
    <label class="form-label">Teacher Name</label>
    <input class="form-input" id="s-teacher" type="text" placeholder="e.g. Mr. Johnson" oninput="saveSetting('teacherName',this.value)">
  </div>
  <div class="form-group">
    <label class="form-label">Class Code</label>
    <input class="form-input" id="s-class" type="text" placeholder="e.g. MR-JOHNSON-3B" oninput="saveSetting('classCode',this.value)">
  </div>
  <div class="form-group">
    <label class="form-label">School Name</label>
    <input class="form-input" id="s-school" type="text" placeholder="e.g. MLK Elementary" oninput="saveSetting('schoolName',this.value)">
  </div>
  <button class="btn-secondary" onclick="loadSampleData()" style="margin-bottom:8px;">🧪 Load Sample Class</button>
  <button class="btn-secondary" onclick="clearAllData()" style="border-color:rgba(255,71,87,.3);color:var(--red);">🗑️ Reset All Data</button>
</div>

<!-- KING CARD MODAL -->
<div class="modal-bg" id="card-modal">
  <div class="modal-box">
    <div class="modal-title">👑 King Card</div>
    <div id="modal-card-content"></div>
    <button class="modal-close" onclick="document.getElementById('card-modal').classList.remove('open')">Close</button>
  </div>
</div>

<!-- PROGRESS MODAL -->
<div class="modal-bg" id="prog-modal">
  <div class="modal-box">
    <div class="modal-title">📊 <span id="pm-student-name">Student</span>'s Progress</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Check off completed missions. Saves automatically.</div>
    <div id="pm-checklist"></div>
    <button class="modal-close" onclick="closeProgressModal()">Done ✓</button>
  </div>
</div>

<div id="toast"><span id="toast-icon">✓</span> <span id="toast-text"></span></div>

<script>

// ── STORAGE ───────────────────────────────────────────────────
function getRoster()  { try{return JSON.parse(localStorage.getItem('kt_roster')||'{}')}catch(e){return{}} }
function saveRoster(r){ localStorage.setItem('kt_roster',JSON.stringify(r)); }
function getStudentKey(code){ return 'kt_student_'+code; }
function getStudent(code){ try{return JSON.parse(localStorage.getItem(getStudentKey(code))||'null')}catch(e){return null} }
function saveStudent(code,data){ localStorage.setItem(getStudentKey(code),JSON.stringify(data)); }
function getSettings(){ try{return JSON.parse(localStorage.getItem('kt_settings')||'{}')}catch(e){return{}} }
function saveSettings(s){ localStorage.setItem('kt_settings',JSON.stringify(s)); }
function saveSetting(key,val){ const s=getSettings(); s[key]=val; saveSettings(s); }

function getQuestProgress(code){
  try{return JSON.parse(localStorage.getItem('kt_quest_progress_'+code)||'{}')}catch(e){return{}}
}

// World names in order
const WORLD_NAMES = ['Egypt','Nubia','Kush','Mali','Songhai','Timbuktu','Axum','Diaspora'];
const WORLD_MISSIONS = [4,4,5,4,4,4,4,4]; // missions per world

function getStudentWorld(code){
  const progress = getQuestProgress(code);
  const done = Object.keys(progress).length;
  let total = 0;
  for(let i=0;i<WORLD_NAMES.length;i++){
    total += WORLD_MISSIONS[i];
    if(done < total) return WORLD_NAMES[i];
  }
  return 'Complete! 🏆';
}

// ── CODE GENERATION ───────────────────────────────────────────
function generateCode(){
  const used = new Set(Object.keys(getRoster()));
  let code;
  do { code = String(Math.floor(1000+Math.random()*9000)); } while(used.has(code));
  return code;
}

// ── ADD STUDENT ───────────────────────────────────────────────
function addStudent(){
  try {
    var nameEl = document.getElementById('f-name');
    var gradeEl = document.getElementById('f-grade');
    if(!nameEl || !gradeEl) { alert('Form not found'); return; }
    
    var name = nameEl.value.trim();
    var grade = gradeEl.value;
    
    if(name.length < 1) { alert('Please enter a student name'); return; }
    
    var code = generateCode();
    var student = { code:code, name:name, grade:grade, classCode:'MY-CLASS', xp:0, crowns:0, quests:0, profileComplete:false, createdAt:Date.now() };
    
    saveStudent(code, student);
    
    var roster = getRoster();
    roster[code] = { name:name, grade:grade, classCode:'MY-CLASS' };
    saveRoster(roster);
    
    nameEl.value = '';
    
    alert('King ' + name + ' added! Code: ' + code);
    renderRoster();
    renderProgress();
    renderCodes();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// ── BULK ADD ──────────────────────────────────────────────────
function bulkAdd(){
  const raw = document.getElementById('bulk-names').value.trim();
  if(!raw){ toast('⚠️','Paste some names first!'); return; }

  const settings = getSettings();
  const classCode = settings.classCode || 'MY-CLASS';
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let added = 0;

  lines.forEach(line => {
    const parts = line.split(',').map(p=>p.trim());
    const name  = parts[0];
    const grade = parts[1] || '3';
    if(name.length < 1) return;

    const code = generateCode();
    const student = { code, name, grade, classCode, xp:0, crowns:0, quests:0, profileComplete:false, createdAt:Date.now() };
    saveStudent(code, student);
    const roster = getRoster();
    roster[code] = { name, grade, classCode };
    saveRoster(roster);
    added++;
  });

  document.getElementById('bulk-names').value = '';
  toast('👑', `${added} kings added to your roster!`);
  renderAll();
}

// ── REMOVE STUDENT ────────────────────────────────────────────
function removeStudent(code){
  if(!confirm('Remove this student? Their progress will be deleted.')) return;
  const roster = getRoster();
  delete roster[code];
  saveRoster(roster);
  localStorage.removeItem(getStudentKey(code));
  localStorage.removeItem('kt_quest_progress_'+code);
  toast('🗑️','Student removed.');
  renderAll();
}

// ── RESET STUDENT PROGRESS ────────────────────────────────────
function resetProgress(code){
  const student = getStudent(code);
  if(!student) return;
  if(!confirm(`Reset all progress for ${student.name}? This cannot be undone.`)) return;
  student.xp = 0; student.crowns = 0; student.quests = 0; student.profileComplete = false;
  saveStudent(code, student);
  localStorage.removeItem('kt_quest_progress_'+code);
  toast('🔄', `${student.name}'s progress has been reset.`);
  renderAll();
}

// ── RENDER ROSTER ─────────────────────────────────────────────
function renderRoster(){
  const roster   = getRoster();
  const codes    = Object.keys(roster);
  const search   = (document.getElementById('search')||{value:''}).value.toLowerCase();
  const list     = document.getElementById('roster-list');

  // Stats
  const statsEl = document.getElementById('roster-stats');
  const totalXP  = codes.reduce((sum,c)=>{ const s=getStudent(c); return sum+(s?s.xp:0); },0);
  const active   = codes.filter(c=>{ const s=getStudent(c); return s && s.xp > 0; }).length;
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val">${codes.length}</div><div class="stat-lbl">Students</div></div>
    <div class="stat-card"><div class="stat-icon">⚡</div><div class="stat-val">${active}</div><div class="stat-lbl">Active</div></div>
    <div class="stat-card"><div class="stat-icon">✨</div><div class="stat-val">${totalXP.toLocaleString()}</div><div class="stat-lbl">Total XP Earned</div></div>
    <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-val">${codes.filter(c=>{const s=getStudent(c);return s&&s.profileComplete;}).length}</div><div class="stat-lbl">Kings Created</div></div>
  `;
  if(document.getElementById('count-roster')) document.getElementById('count-roster').textContent = codes.length;

  if(codes.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No students yet</div><div class="empty-sub">Add students one by one or use Bulk Add to import your whole class.</div></div>`;
    return;
  }

  const filtered = codes.filter(code => {
    const s = getStudent(code);
    if(!s) return false;
    return !search || s.name.toLowerCase().includes(search) || code.includes(search);
  });

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-sub">Try a different name or code.</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(code => {
    const s = getStudent(code);
    if(!s) return '';
    const world     = getStudentWorld(code);
    const lastActive = s.lastActive ? timeAgo(s.lastActive) : 'Never';
    const statusCls  = s.xp > 0 ? (Date.now()-s.createdAt < 86400000*3 ? 'status-new' : 'status-active') : 'status-inactive';
    const statusLbl  = s.xp > 0 ? (Date.now()-s.createdAt < 86400000*3 ? 'New' : 'Active') : 'Not started';

    return `<div class="student-row">
      <div class="code-badge" onclick="showCardModal('${code}')" title="Click to view King Card">
        <div class="copy-tip">View Card</div>
        ${code}
      </div>
      <div class="student-name">${s.name}</div>
      <div class="student-grade">Gr ${s.grade}</div>
      <div class="student-class hide-mobile">${s.classCode||'—'}</div>
      <div class="xp-val hide-mobile">${(s.xp||0).toLocaleString()}</div>
      <div class="world-tag hide-mobile">${world}</div>
      <div class="hide-mobile ${statusCls}"><span class="status-dot"></span><span class="last-active">${statusLbl}</span></div>
      <div class="row-actions">
        <button class="row-btn print" onclick="showCardModal('${code}')" title="Print card">🃏</button>
        <button class="row-btn" onclick="showProgressModal('${code}')" title="Update progress" style="background:rgba(0,196,140,.1);border-color:rgba(0,196,140,.25);color:var(--green);">📊</button>
        <button class="row-btn" onclick="resetProgress('${code}')" title="Reset progress">🔄</button>
        <button class="row-btn" onclick="removeStudent('${code}')" title="Remove student">🗑️</button>

function renderProgress(){
  const roster = getRoster();
  const codes  = Object.keys(roster);
  const el = document.getElementById('progress-content');

  if(codes.length === 0){
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No student data yet</div><div class="empty-sub">Add students to your roster, then tap 📊 on each student to mark their progress.</div></div>`;
    return;

  const sorted = codes.map(code => {
    const student = getStudent(code);
    const progress = getMergedProgress(code);
    const completedCount = ALL_MISSIONS.filter(m => !!progress[m.id]).length;
    const totalXP = ALL_MISSIONS.filter(m => !!progress[m.id]).reduce((sum, m) => sum + m.xp, 0);
    return { code, student, completedCount, totalXP, progress };
  })
  .filter(e => e.student)
  .sort((a,b) => b.completedCount - a.completedCount);

  const totalMissions = ALL_MISSIONS.length;

    sorted.map(({code, student, completedCount, totalXP, progress}, i) => {
      const pct = Math.round((completedCount / totalMissions) * 100);
      const medal = i===0&&completedCount>0?'🥇':i===1&&completedCount>0?'🥈':i===2&&completedCount>0?'🥉':'👑';
      const completedNames = ALL_MISSIONS.filter(m => !!progress[m.id]).map(m => m.name);
      return '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;" onclick="showProgressModal('' + code + '')">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:18px;">' + medal + '</span>' +
        '<div>' +
        '<div style="font-weight:800;font-size:14px;">' + student.name + '</div>' +
        '<div style="font-size:11px;color:var(--muted);">Grade ' + student.grade + ' · ' + completedCount + '/' + totalMissions + ' missions</div>' +
        '</div>' +
        '</div>' +
        '<div style="text-align:right;">' +
        '<div style="font-family:var(--f-d);font-size:16px;font-weight:900;color:var(--gold);">' + totalXP + ' XP</div>' +
        '<div style="font-size:10px;color:var(--muted);">' + pct + '% complete</div>' +
        '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,.06);border-radius:100px;height:8px;overflow:hidden;margin-bottom:' + (completedNames.length > 0 ? '8' : '0') + 'px;">' +
        '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:100px;transition:width .5s;"></div>' +
        '</div>' +
        (completedNames.length > 0 ? '<div style="font-size:10px;color:var(--green);line-height:1.6;">✅ ' + completedNames.join(' · ') + '</div>' : '') +
        '</div>';
    }).join('') +
    '</div>';
}

function timeAgo(ts){
  const diff = (Date.now()-ts)/1000;
  if(diff < 60)   return 'Just now';
  if(diff < 3600) return Math.floor(diff/60)+'m ago';
  if(diff < 86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

}

function showProgressModal(code) {
  currentProgressCode = code;

  });

  let html = '';
  Object.keys(worlds).forEach(world => {
    html += '<div style="font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 6px;">⚔️ ' + world + '</div>';
    worlds[world].forEach(m => {
      const done = !!combined[m.id];
      html += '<label style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--card);border:1px solid ' + (done ? 'rgba(0,196,140,.3)' : 'var(--border)') + ';border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;">' +

        '</div>' +
        (done ? '<span style="color:var(--green);font-size:16px;">✅</span>' : '') +
        '</label>';
    });
  });

  document.getElementById('pm-missions').innerHTML = html;
  document.getElementById('progress-modal').classList.add('show');
}

function toggleMission(checkbox, code) {
  const missionId = checkbox.getAttribute('data-id');
  const xp = parseInt(checkbox.getAttribute('data-xp'));
  const manualKey = 'kt_manual_progress_' + code;

  let manual = {};
  try { manual = JSON.parse(localStorage.getItem(manualKey) || '{}'); } catch(e) {}

  if (checkbox.checked) {
    manual[missionId] = { completedAt: Date.now(), manual: true };
    // Update student XP
    const student = getStudent(code);
    if (student) {
      student.xp = (student.xp || 0) + xp;
      student.crowns = (student.crowns || 0) + 1;
      saveStudent(code, student);
    }
    checkbox.closest('label').style.borderColor = 'rgba(0,196,140,.3)';
    checkbox.closest('label').style.color = 'var(--green)';
  } else {
    delete manual[missionId];
    // Subtract XP
    const student = getStudent(code);
    if (student) {
      student.xp = Math.max(0, (student.xp || 0) - xp);
      student.crowns = Math.max(0, (student.crowns || 0) - 1);
      saveStudent(code, student);
    }
    checkbox.closest('label').style.borderColor = 'var(--border)';
  }

  localStorage.setItem(manualKey, JSON.stringify(manual));
  showToast('✓', 'Progress saved!');
  renderProgress();
}

  document.getElementById('progress-modal').classList.remove('show');
  currentProgressCode = null;
  renderRoster();
  renderProgress();
}

  const device = getQuestProgress(code);
  let manual = {};
  try { manual = JSON.parse(localStorage.getItem("kt_manual_progress_" + code) || "{}"); } catch(e) {}
  return Object.assign({}, manual, device);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function loadSettings() {
  const s = getSettings();
  const el = (id) => document.getElementById(id);
  if(el("s-teacher") && s.teacherName) el("s-teacher").value = s.teacherName;
  if(el("s-class") && s.classCode) el("s-class").value = s.classCode;
  if(el("s-school") && s.schoolName) el("s-school").value = s.schoolName;
}

// ── BOOT ──────────────────────────────────────────────────────
renderRoster();
renderProgress();
renderCodes();
loadSettings();
</script>
</body>
