<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KingThinkers — Teacher Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B0B1E;--navy2:#13132A;--card:#1C1C3A;
  --gold:#F5A800;--amber:#FF6B1A;--green:#00C48C;
  --sky:#38BDF8;--red:#FF4757;
  --white:#FFFFFF;--muted:#8080A8;--border:rgba(255,255,255,0.08);
  --f-d:"Baloo 2",cursive;--f-b:"Nunito",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--navy);font-family:var(--f-b);color:var(--white);}

#topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.t-logo{font-family:var(--f-d);font-size:15px;font-weight:900;color:var(--gold);}
.t-link{padding:7px 12px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);background:transparent;text-decoration:none;display:inline-block;}
.t-link.gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:900;}

#tab-nav{background:var(--navy2);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:45px;z-index:49;}
#tab-nav::-webkit-scrollbar{display:none;}
#tab-nav a{flex-shrink:0;padding:12px 14px;font-size:12px;font-weight:800;color:var(--muted);text-decoration:none;white-space:nowrap;display:block;border-bottom:2px solid transparent;margin-bottom:-2px;}

.section{padding:16px 14px 24px;}
.section+.section{border-top:1px solid var(--border);}
.sh{font-family:var(--f-d);font-size:18px;font-weight:900;color:var(--gold);margin-bottom:14px;}

.lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.inp{background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-family:var(--f-b);font-size:14px;color:var(--white);width:100%;display:block;outline:none;-webkit-appearance:none;margin-bottom:10px;}
.inp:focus{border-color:rgba(245,168,0,.5);}
textarea.inp{min-height:110px;resize:vertical;}

.add-btn{display:block;width:100%;background:linear-gradient(135deg,var(--gold),var(--amber));border:none;border-radius:12px;padding:15px;font-family:var(--f-d);font-size:16px;font-weight:900;color:#000;margin-top:6px;-webkit-appearance:none;}

.stat-row{display:flex;gap:10px;margin-bottom:14px;}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-n{font-family:var(--f-d);font-size:22px;font-weight:900;color:var(--gold);}
.stat-l{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;}

.s-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;flex-direction:column;gap:10px;}
.s-card-top{display:flex;align-items:center;gap:10px;}
.s-card-bottom{display:flex;flex-direction:column;gap:6px;}

/* At-risk signal */
.risk-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.risk-green{background:#00C48C;color:#00C48C;}
.risk-yellow{background:#F5A800;color:#F5A800;}
.risk-red{background:#FF4757;color:#FF4757;}

/* Mini progress bar */
.mini-bar-bg{background:rgba(255,255,255,.07);border-radius:100px;height:6px;overflow:hidden;flex:1;}
.mini-bar-fg{height:100%;border-radius:100px;transition:width .6s ease;}

/* Skill bars */
.skill-row{display:flex;align-items:center;gap:8px;}
.skill-lbl{font-size:10px;font-weight:800;color:var(--muted);width:52px;flex-shrink:0;}
.skill-bar-bg{flex:1;background:rgba(255,255,255,.07);border-radius:100px;height:5px;overflow:hidden;}
.skill-bar-fg{height:100%;border-radius:100px;}

/* Standards pills */
.std-pill{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);border-radius:100px;padding:2px 8px;font-size:9px;font-weight:800;color:#A78BFA;white-space:nowrap;}

/* Last active */
.last-active{font-size:10px;font-weight:700;}
.la-recent{color:var(--green);}
.la-week{color:var(--gold);}
.la-old{color:var(--red);}
.la-never{color:var(--muted);}

/* Sort controls */
.sort-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.sort-btn{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:11px;font-weight:800;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sort-btn.active{background:rgba(245,168,0,.15);border-color:rgba(245,168,0,.5);color:var(--gold);}
.s-code{font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--gold);background:rgba(245,168,0,.1);border:1px solid rgba(245,168,0,.2);border-radius:8px;padding:6px 10px;flex-shrink:0;min-width:58px;text-align:center;}
.s-info{flex:1;min-width:0;}
.s-name{font-weight:800;font-size:15px;}
.s-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.s-btns{display:flex;gap:6px;}
.s-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:16px;display:flex;align-items:center;justify-content:center;}
.s-btn.grn{background:rgba(0,196,140,.1);border-color:rgba(0,196,140,.3);}

.p-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.p-bar-bg{background:rgba(255,255,255,.06);border-radius:100px;height:8px;overflow:hidden;margin:8px 0;}
.p-bar-fg{height:100%;background:linear-gradient(90deg,var(--gold),var(--amber));border-radius:100px;}

.kg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.kc{background:linear-gradient(135deg,#0B0B1E,#1A1A3A);border:2px solid var(--gold);border-radius:14px;padding:14px;text-align:center;}
.kc-crown{font-size:24px;}.kc-brand{font-size:8px;font-weight:900;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin:4px 0;}
.kc-name{font-family:var(--f-d);font-size:13px;font-weight:900;margin:6px 0;}
.kc-div{height:1px;background:rgba(245,168,0,.3);margin:6px 0;}
.kc-lbl{font-size:9px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.1em;}
.kc-code{font-family:var(--f-d);font-size:26px;font-weight:900;color:var(--gold);letter-spacing:.2em;}
.kc-gr{font-size:10px;color:var(--muted);margin-top:4px;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-i{font-size:44px;margin-bottom:10px;}

.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:var(--f-d);font-size:17px;font-weight:900;color:var(--gold);margin-bottom:12px;}
.modal-close{display:block;width:100%;margin-top:14px;background:var(--gold);border:none;border-radius:10px;padding:13px;font-family:var(--f-d);font-size:14px;font-weight:900;color:#000;}

.m-check{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--navy2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.m-check input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);flex-shrink:0;}
.m-info{flex:1;}.m-name{font-size:13px;font-weight:700;}.m-meta{font-size:10px;color:var(--muted);}
.m-world{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 5px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.ghost-btn{display:block;width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:var(--f-b);font-size:13px;font-weight:700;color:var(--muted);margin-top:8px;}
.danger-btn{display:block;width:100%;background:transparent;border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:12px;font-family:var(--f-b);font-size:13px;font-weight:700;color:var(--red);margin-top:8px;}

@media print{
  body.print-cards-only #topbar,
  body.print-cards-only #tab-nav,
  body.print-cards-only #toast,
  body.print-cards-only #card-modal,
  body.print-cards-only #prog-modal,
  body.print-cards-only .section:not(#codes),
  body.print-cards-only .sort-bar,
  body.print-cards-only .add-btn,
  body.print-cards-only .ghost-btn,
  body.print-cards-only .danger-btn,
  body.print-cards-only input,
  body.print-cards-only select,
  body.print-cards-only textarea {display:none!important;}
  body.print-cards-only #codes {display:block!important;}
  body.print-cards-only .kg{display:grid!important;}
  body.print-cards-only .kc{break-inside:avoid;}
}
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>

<div id="topbar">
  <div>
    <div class="t-logo">👑 Teacher Roster</div>
    <div id="teacher-name-display" style="font-size:11px;color:var(--muted);margin-top:1px;"></div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="t-link" onclick="window.print()">🖨️ Print</button>
    <a class="t-link gold" href="kingthinkers-dashboard.html">👦 Student View</a>
    <button class="t-link" id="logout-btn" style="border-color:rgba(255,71,87,.3);color:var(--red);">🚪 Log Out</button>
  </div>
</div>

<div id="tab-nav">
  <a href="#roster">📋 Roster</a>
  <a href="#progress">📊 Progress</a>
  <a href="#codes">🔑 King Codes</a>
  <a href="#add">➕ Add Student</a>
  <a href="#settings">⚙️ Settings</a>
</div>

<!-- ROSTER -->
<div class="section" id="roster">
  <div class="sh">📋 Class Roster</div>
  <div class="stat-row">
    <div class="stat-box"><div class="stat-n" id="st-count">0</div><div class="stat-l">Students</div></div>
    <div class="stat-box"><div class="stat-n" id="st-active">0</div><div class="stat-l">Active</div></div>
    <div class="stat-box"><div class="stat-n" id="st-xp">0</div><div class="stat-l">Total XP</div></div>
  </div>
  <input type="text" id="search" class="inp" placeholder="Search students…" oninput="renderRoster()">
  <div class="sort-bar">
  <button class="sort-btn active" id="sort-name" onclick="setSort('name')">A–Z Name</button>
  <button class="sort-btn" id="sort-progress" onclick="setSort('progress')">Progress</button>
  <button class="sort-btn" id="sort-xp" onclick="setSort('xp')">XP</button>
  <button class="sort-btn" id="sort-risk" onclick="setSort('risk')">At Risk First</button>
</div>
<div id="roster-list"></div>
</div>

<!-- PROGRESS -->
<div class="section" id="progress">
  <div class="sh">📊 Progress Overview</div>
  <div id="prog-list"></div>
</div>

<!-- KING CODES -->
<div class="section" id="codes">
  <div class="sh">🔑 King Codes</div>
  <button class="add-btn" id="print-cards-btn" style="margin-bottom:14px;" onclick="printKingCards()">🖨️ Print All King Cards</button>
  <div class="kg" id="codes-grid"></div>
</div>

<!-- ADD STUDENT -->
<div class="section" id="add">
  <div class="sh">➕ Add a Student</div>
  <label class="lbl">Student Name</label>
  <input type="text" id="f-name" class="inp" placeholder="First name" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="words">
  <label class="lbl">Grade</label>
  <select id="f-grade" class="inp">
    <option value="K">Kindergarten</option>
    <option value="1">1st Grade</option>
    <option value="2">2nd Grade</option>
    <option value="3" selected>3rd Grade</option>
    <option value="4">4th Grade</option>
    <option value="5">5th Grade</option>
  </select>
  <button class="add-btn" id="add-btn">Add King 👑</button>

  <div style="margin-top:28px;">
    <div class="sh" style="font-size:16px;">📥 Bulk Add</div>
    <label class="lbl">One name per line. Add grade after comma: Marcus, 3</label>
    <textarea id="bulk-names" class="inp" placeholder="Marcus&#10;Jaylen, 4&#10;Kofi, 2&#10;Amari&#10;Zion, 5"></textarea>
    <button class="add-btn" id="bulk-btn" onclick="doBulk()">Add All Students</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="section" id="settings">
  <div class="sh">⚙️ Settings</div>
  <label class="lbl">Teacher Name</label>
  <input type="text" id="s-teacher" class="inp" placeholder="e.g. Mr. Johnson">
  <label class="lbl">Class Code</label>
  <input type="text" id="s-class" class="inp" placeholder="e.g. MR-JOHNSON-3B">
  <label class="lbl">School Name</label>
  <input type="text" id="s-school" class="inp" placeholder="e.g. MLK Elementary">
  <button class="ghost-btn" id="save-settings-btn" onclick="saveSettingsNow()">Save Settings ✓</button>
  <button class="ghost-btn" id="sync-btn" style="background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:var(--sky);" onclick="syncFromSupabase()">☁️ Sync from Cloud</button>
  <button class="ghost-btn" id="sample-btn">🧪 Load Sample Class</button>
  <button class="danger-btn" id="clear-btn" onclick="clearAllData()">🗑️ Reset All Data</button>
</div>

<!-- CARD MODAL -->
<div class="modal-bg" id="card-modal">
  <div class="modal-box">
    <div class="modal-title">👑 King Card</div>
    <div id="card-body"></div>
    <button class="modal-close" id="card-close-btn">Close</button>
  </div>
</div>

<!-- PROGRESS MODAL -->
<div class="modal-bg" id="prog-modal">
  <div class="modal-box">
    <div class="modal-title">📊 <span id="pm-name">Student</span>'s Progress</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Check off completed missions.</p>
    <div id="pm-list"></div>
    <button class="modal-close" id="prog-close-btn">Done ✓</button>
  </div>
</div>

<div id="toast">✓</div>

<script>
var _progCode = null;
var _teacherSession = null;

// ── SESSION CHECK ─────────────────────────────────────────────
function getTeacherSession() {
  // Session-only — matches login page. No localStorage fallback.
  // If the tab closes, the teacher must log in again (safer on shared devices).
  if (typeof kt_getTeacherSession === 'function') return kt_getTeacherSession();
  try {
    var session = JSON.parse(sessionStorage.getItem('kt_teacher') || 'null');
    return (session && session.token) ? session : null;
  } catch(e) { return null; }
}

_teacherSession = getTeacherSession();
if (!_teacherSession) {
  window.location.href = 'kingthinkers-teacher-login.html';
}

// ── STORAGE ───────────────────────────────────────────────────
var rosterState = [];
function escapeHtml(value){
  return String(value == null ? '' : value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function getRosterCacheKey(){
  var cls = _teacherSession && _teacherSession.classCode ? _teacherSession.classCode : 'global';
  var teacher = _teacherSession && (_teacherSession.username || _teacherSession.name) ? (_teacherSession.username || _teacherSession.name) : 'teacher';
  return 'kt_roster_cache_' + teacher + '_' + cls;
}
function getCachedRoster(){
  try { return JSON.parse(localStorage.getItem(getRosterCacheKey()) || '[]'); } catch(e){ return []; }
}
function saveCachedRoster(students){
  localStorage.setItem(getRosterCacheKey(), JSON.stringify(students || []));
}
function getStudent(c){
  for (var i = 0; i < rosterState.length; i++) {
    if (rosterState[i].code === c) return rosterState[i];
  }
  return null;
}
function saveStudentLocal(c,s){localStorage.setItem('kt_student_'+c,JSON.stringify(s))}
function setRosterState(students){
  rosterState = (students || []).map(function(s){
    return {
      code: String(s.code || ''),
      name: s.name || '',
      grade: s.grade || '3',
      classCode: s.classCode || s.class_code || (_teacherSession ? _teacherSession.classCode : ''),
      xp: typeof s.xp === 'number' ? s.xp : 0,
      crowns: typeof s.crowns === 'number' ? s.crowns : 0,
      profileComplete: !!(s.profileComplete || s.profile_complete),
      lastActive: s.lastActive || s.last_active || null,
      createdAt: s.createdAt || Date.now()
    };
  }).filter(function(s){ return !!s.code; });
}
function persistRosterCache(){
  saveCachedRoster(rosterState);
  rosterState.forEach(function(s){ saveStudentLocal(s.code, s); });
  var legacyRoster = {};
  rosterState.forEach(function(s){
    saveStudentLocal(s.code, s);
    legacyRoster[s.code] = { name: s.name, grade: s.grade };
  });
  localStorage.setItem('kt_roster', JSON.stringify(legacyRoster));
}
function getSettings(){try{return JSON.parse(localStorage.getItem('kt_settings')||'{}')}catch(e){return{}}}
function putSetting(k,v){var s=getSettings();s[k]=v;localStorage.setItem('kt_settings',JSON.stringify(s))}
function getDevProg(c){try{return JSON.parse(localStorage.getItem('kt_quest_progress_'+c)||'{}')}catch(e){return{}}}
function getManProg(c){try{return JSON.parse(localStorage.getItem('kt_manual_'+c)||'{}')}catch(e){return{}}}
function saveManProg(c,p){localStorage.setItem('kt_manual_'+c,JSON.stringify(p))}
function getMerged(c){return Object.assign({},getManProg(c),getDevProg(c))}

var MISSIONS=[
  {id:'e1',name:"The Pharaoh's Secret",world:'Egypt',type:'Reading',xp:40},
  {id:'e2',name:'Hieroglyph Numbers',world:'Egypt',type:'Math',xp:35},
  {id:'e3',name:"The Nile's Gift",world:'Egypt',type:'Reading',xp:40},
  {id:'e4',name:'Pyramid Fractions',world:'Egypt',type:'Math',xp:35},
  {id:'n1',name:'Warriors of the South',world:'Nubia',type:'Reading',xp:40},
  {id:'n2',name:'Trade Route Math',world:'Nubia',type:'Math',xp:35},
  {id:'n3',name:'The Black Pharaohs',world:'Nubia',type:'Reading',xp:40},
  {id:'n4',name:'Archery Angles',world:'Nubia',type:'Math',xp:35},
];

function genCode(){
  var used=rosterState.map(function(s){ return s.code; });
  var code;
  do{code=String(Math.floor(1000+Math.random()*9000))}while(used.indexOf(code)>-1);
  return code;
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

function getWorld(c){
  var done=Object.keys(getMerged(c)).length;
  if(done<4)return'Egypt';if(done<8)return'Nubia';return'Kush+';
}


async function loadSampleStudents() {
  if (!confirm('Load 5 sample students? This adds to your existing roster.')) return;
  var names = [['Marcus','3'],['Jaylen','4'],['Kofi','3'],['Amari','2'],['Zion','5']];
  var classCode = _teacherSession ? _teacherSession.classCode : 'DEMO';
  var students = names.map(function(n) {
    return {
      code: genCode(),
      name: n[0],
      grade: n[1],
      classCode: classCode,
      xp: 0,
      crowns: 0,
      createdAt: Date.now()
    };
  });

  try {
    if (typeof db_bulkAddStudents === 'function') {
      await db_bulkAddStudents(students.map(function(s) {
        return { code: s.code, name: s.name, grade: s.grade };
      }), classCode);
    }

    students.forEach(function(s) {
      saveStudentLocal(s.code, s);
      rosterState.push(s);
    });
    persistRosterCache();
    toast('✅ Sample class loaded!');
    renderAll();
  } catch (e) {
    toast('⚠️ Sample class failed: ' + e.message);
    console.warn('loadSampleStudents failed:', e);
  }
}

// ── ADD ───────────────────────────────────────────────────────
async function doAdd(){
  var nameEl=document.getElementById('f-name');
  var gradeEl=document.getElementById('f-grade');
  if(!nameEl||!gradeEl){toast('Form error');return;}
  var name=nameEl.value.trim();
  var grade=gradeEl.value||'3';
  if(!name){toast('Enter a name first');return;}
  var classCode=_teacherSession?_teacherSession.classCode:'MY-CLASS';
  var code=genCode();
  try {
    // Server add first — if it fails, don't update local state
    if(typeof db_addStudent==='function'){
      await db_addStudent(code, name, grade, classCode);
    }
    var s={code:code,name:name,grade:grade,classCode:classCode,xp:0,crowns:0,createdAt:Date.now()};
    rosterState.push(s);
    persistRosterCache();
    nameEl.value='';
    toast('King '+name+' added! Code: '+code);
    renderAll();
  } catch(e) {
    toast('⚠️ Failed to add student: '+e.message);
    console.warn('doAdd failed:',e);
  }
}

async function doBulk(){
  var raw=document.getElementById('bulk-names').value.trim();
  if(!raw){toast('Paste names first');return}
  var lines=raw.split('\n');
  var students=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var parts=line.split(',');
    var name=parts[0].trim();var grade=parts[1]?parts[1].trim():'3';
    if(!name)continue;
    var code=genCode();
    students.push({code:code,name:name,grade:grade});
  }
  if(!students.length){toast('No valid names found');return;}

  // Atomic API call — all succeed or all fail (no partial state)
  try {
    var _cc = _teacherSession ? _teacherSession.classCode : 'MY-CLASS';
    await db_bulkAddStudents(students, _cc);
    // Only update local state after server confirms success
    students.forEach(function(s){
      rosterState.push({code:s.code,name:s.name,grade:s.grade,
        classCode:_teacherSession?_teacherSession.classCode:'MY-CLASS',
        xp:0,crowns:0,createdAt:Date.now()});
    });
    persistRosterCache();
    document.getElementById('bulk-names').value='';
    toast(students.length+' students added!');
    renderAll();
  } catch(e) {
    toast('⚠️ Bulk add failed: '+e.message);
    console.warn('Bulk add failed:', e);
  }
}

async function removeStudent(code){
  if(!confirm('Remove '+code+'?'))return;
  if (typeof db_removeStudent !== 'function') {
    toast('⚠️ Delete service unavailable');
    return;
  }
  try {
    await db_removeStudent(code);
  } catch(e){
    toast('⚠️ Failed to remove: ' + e.message);
    console.warn('Supabase delete failed',e);
    return;
  }
  rosterState = rosterState.filter(function(s){ return s.code !== code; });
  localStorage.removeItem('kt_student_'+code);
  localStorage.removeItem('kt_quest_progress_'+code);
  persistRosterCache();
  toast('Removed');renderAll();
}

// ── SORT STATE ────────────────────────────────────────────────
var _sortBy = 'name';

function setSort(by) {
  _sortBy = by;
  document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('sort-'+by);
  if (btn) btn.classList.add('active');
  renderRoster();
}

// ── HELPERS ───────────────────────────────────────────────────

function getRiskLevel(done, lastActive) {
  var daysSince = lastActive ? Math.floor((Date.now() - new Date(lastActive).getTime()) / 86400000) : 999;
  if (done >= 4 || (done >= 2 && daysSince <= 7)) return 'green';
  if (done === 0 || daysSince >= 14) return 'red';
  return 'yellow';
}

function getRiskScore(done, lastActive) {
  var risk = getRiskLevel(done, lastActive);
  return risk === 'red' ? 0 : risk === 'yellow' ? 1 : 2;
}

function getLastActiveLabel(lastActive) {
  if (!lastActive) return { text: 'Never logged in', cls: 'la-never' };
  var days = Math.floor((Date.now() - new Date(lastActive).getTime()) / 86400000);
  if (days === 0) return { text: 'Active today', cls: 'la-recent' };
  if (days === 1) return { text: 'Active yesterday', cls: 'la-recent' };
  if (days <= 7)  return { text: 'Active ' + days + 'd ago', cls: 'la-week' };
  if (days <= 14) return { text: days + ' days ago', cls: 'la-old' };
  return { text: days + 'd ago — check in!', cls: 'la-old' };
}

function getStandards(p) {
  var stds = [];
  MISSIONS.forEach(function(m) {
    if (p[m.id]) {
      if (m.type === 'Reading') { if (stds.indexOf('RI.3') < 0) stds.push('RI.3'); }
      if (m.id === 'e2') { if (stds.indexOf('3.NBT') < 0) stds.push('3.NBT'); }
      if (m.id === 'e4') { if (stds.indexOf('3.NF') < 0) stds.push('3.NF'); }
      if (m.id === 'n2') { if (stds.indexOf('3.OA') < 0) stds.push('3.OA'); if (stds.indexOf('3.MD') < 0) stds.push('3.MD'); }
      if (m.id === 'n4') { if (stds.indexOf('3.G') < 0) stds.push('3.G'); }
    }
  });
  return stds;
}

function getSkillLevels(p) {
  var readingMissions  = MISSIONS.filter(function(m){ return m.type === 'Reading'; });
  var mathMissions     = MISSIONS.filter(function(m){ return m.type === 'Math'; });
  var readingDone = readingMissions.filter(function(m){ return !!p[m.id]; }).length;
  var mathDone    = mathMissions.filter(function(m){ return !!p[m.id]; }).length;
  return {
    reading: Math.round(readingDone / readingMissions.length * 100),
    math:    Math.round(mathDone    / mathMissions.length    * 100),
  };
}

function skillColor(pct) {
  if (pct >= 60) return 'var(--green)';
  if (pct >= 30) return 'var(--gold)';
  return 'var(--red)';
}

// ── RENDER ROSTER ─────────────────────────────────────────────
function renderRoster(){
  var search=(document.getElementById('search')||{value:''}).value.toLowerCase();
  var totalXP=0,active=0;
  rosterState.forEach(function(s){ totalXP += (s.xp||0); if ((s.xp||0) > 0) active++; });
  var stCount=document.getElementById('st-count');
  var stActive=document.getElementById('st-active');
  var stXP=document.getElementById('st-xp');
  if(stCount) stCount.textContent=rosterState.length;
  if(stActive) stActive.textContent=active;
  if(stXP) stXP.textContent=totalXP;

  var list=document.getElementById('roster-list');
  if(!list) return;
  if(!rosterState.length){
    list.innerHTML='<div class="empty"><div class="empty-i">👥</div><div>No students — use Add Student below</div></div>';
    return;
  }

  // Build data array
  var data = rosterState.map(function(s){
    var p=getMerged(s.code);
    var done=MISSIONS.filter(function(m){return!!p[m.id]}).length;
    var xp=s.xp||0;
    var lastActive=s.lastActive||s.last_active||null;
    var risk=getRiskLevel(done, lastActive);
    return { c:s.code, s:s, p:p, done:done, xp:xp, lastActive:lastActive, risk:risk };
  }).filter(function(d){ return (!search || d.s.name.toLowerCase().indexOf(search)>-1 || d.c.indexOf(search)>-1); });

  // Sort
  data.sort(function(a,b){
    if (_sortBy === 'progress') return b.done - a.done;
    if (_sortBy === 'xp')       return b.xp - a.xp;
    if (_sortBy === 'risk')     return getRiskScore(a.done,a.lastActive) - getRiskScore(b.done,b.lastActive);
    return a.s.name.localeCompare(b.s.name); // name default
  });

  list.innerHTML = data.map(function(d){
    var pct = Math.round(d.done / MISSIONS.length * 100);
    var barColor = pct >= 60 ? 'var(--green)' : pct >= 30 ? 'var(--gold)' : 'var(--red)';
    var riskClass = 'risk-'+d.risk;
    var la = getLastActiveLabel(d.lastActive);
    var skills = getSkillLevels(d.p);
    var stds = getStandards(d.p);
    var stdHtml = stds.length ? stds.map(function(s){ return '<span class="std-pill">'+escapeHtml(s)+'</span>'; }).join('') : '<span class="std-pill" style="opacity:.4;">No standards yet</span>';

    return '<div class="s-card">'+

      // ── TOP ROW: code, risk dot, name, last active, buttons ──
      '<div class="s-card-top">'+
        '<div class="s-code">'+escapeHtml(d.c)+'</div>'+
        '<div class="risk-dot '+riskClass+'" title="'+
          (d.risk==='green'?'On track':d.risk==='yellow'?'Needs attention':'At risk')+'"></div>'+
        '<div class="s-info" style="flex:1;min-width:0;">'+
          '<div class="s-name">'+escapeHtml(d.s.name)+'</div>'+
          '<div class="s-meta">Gr '+escapeHtml(d.s.grade)+' · '+escapeHtml(getWorld(d.c))+' · '+d.done+'/8 missions · '+d.xp+' XP</div>'+
        '</div>'+
        '<div class="s-btns">'+
          '<button class="s-btn grn" data-action="prog" data-code="'+escapeHtml(d.c)+'">📋</button>'+
          '<button class="s-btn" data-action="card" data-code="'+escapeHtml(d.c)+'">🃏</button>'+
          '<button class="s-btn" data-action="del" data-code="'+escapeHtml(d.c)+'">🗑️</button>'+
        '</div>'+
      '</div>'+

      // ── BOTTOM ROW: progress bar, skills, standards, last active ──
      '<div class="s-card-bottom">'+

        // Mini overall progress bar
        '<div style="display:flex;align-items:center;gap:8px;">'+
          '<div style="font-size:10px;font-weight:800;color:var(--muted);width:52px;flex-shrink:0;">Progress</div>'+
          '<div class="mini-bar-bg">'+
            '<div class="mini-bar-fg" style="width:'+pct+'%;background:'+barColor+';"></div>'+
          '</div>'+
          '<div style="font-size:10px;font-weight:900;color:'+barColor+';width:28px;text-align:right;">'+pct+'%</div>'+
        '</div>'+

        // Reading skill bar
        '<div class="skill-row">'+
          '<div class="skill-lbl">Reading</div>'+
          '<div class="skill-bar-bg">'+
            '<div class="skill-bar-fg" style="width:'+skills.reading+'%;background:'+skillColor(skills.reading)+';"></div>'+
          '</div>'+
          '<div style="font-size:10px;font-weight:800;color:'+skillColor(skills.reading)+';width:28px;text-align:right;">'+skills.reading+'%</div>'+
        '</div>'+

        // Math skill bar
        '<div class="skill-row">'+
          '<div class="skill-lbl">Math</div>'+
          '<div class="skill-bar-bg">'+
            '<div class="skill-bar-fg" style="width:'+skills.math+'%;background:'+skillColor(skills.math)+';"></div>'+
          '</div>'+
          '<div style="font-size:10px;font-weight:800;color:'+skillColor(skills.math)+';width:28px;text-align:right;">'+skills.math+'%</div>'+
        '</div>'+

        // Standards + last active row
        '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">'+
          '<div style="display:flex;gap:4px;flex-wrap:wrap;">'+stdHtml+'</div>'+
          '<div class="last-active '+la.cls+'">🕐 '+la.text+'</div>'+
        '</div>'+

      '</div>'+
    '</div>';
  }).join('');
}

function renderProgress(){
  var el=document.getElementById('prog-list');
  if(!rosterState.length){el.innerHTML='<div class="empty"><div class="empty-i">📊</div><div>Add students, then tap 📊 to track progress</div></div>';return}
  var data=rosterState.map(function(s){
    var p=getMerged(s.code);
    var done=MISSIONS.filter(function(m){return!!p[m.id]}).length;
    var xp=MISSIONS.filter(function(m){return!!p[m.id]}).reduce(function(sum,m){return sum+m.xp},0);
    return{c:s.code,s:s,done:done,xp:xp,p:p};
  }).filter(function(d){return d.s}).sort(function(a,b){return b.done-a.done});
  el.innerHTML=data.map(function(d,i){
    var pct=Math.round(d.done/MISSIONS.length*100);
    var medal=(i===0&&d.done>0)?'🥇':(i===1&&d.done>0)?'🥈':(i===2&&d.done>0)?'🥉':'👑';
    var names=MISSIONS.filter(function(m){return!!d.p[m.id]}).map(function(m){return m.name});
    return'<div class="p-card" data-action="prog" data-code="'+escapeHtml(d.c)+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;">'+
        '<div style="display:flex;align-items:center;gap:10px;"><span style="font-size:20px;">'+medal+'</span>'+
          '<div><div style="font-weight:800;font-size:14px;">'+escapeHtml(d.s.name)+'</div>'+
          '<div style="font-size:11px;color:var(--muted);">Gr '+escapeHtml(d.s.grade)+' · '+d.done+'/8 missions</div></div></div>'+
        '<div style="text-align:right;"><div style="font-family:var(--f-d);font-size:16px;font-weight:900;color:var(--gold);">'+d.xp+' XP</div>'+
        '<div style="font-size:10px;color:var(--muted);">'+pct+'%</div></div>'+
      '</div>'+
      '<div class="p-bar-bg"><div class="p-bar-fg" style="width:'+pct+'%"></div></div>'+
      (names.length?'<div style="font-size:10px;color:var(--green);line-height:1.7;">✅ '+escapeHtml(names.join(' · '))+'</div>':'')+
    '</div>';
  }).join('');
}

function renderCodes(){
  var g=document.getElementById('codes-grid');
  if(!rosterState.length){g.innerHTML='<div class="empty"><div class="empty-i">🔑</div><div>No codes yet</div></div>';return}
  g.innerHTML=rosterState.map(function(s){
    return'<div class="kc" data-action="card" data-code="'+escapeHtml(s.code)+'">'+
      '<div class="kc-crown">👑</div><div class="kc-brand">KINGTHINKERS</div>'+
      '<div class="kc-name">King '+escapeHtml(s.name)+'</div><div class="kc-div"></div>'+
      '<div class="kc-lbl">King Code</div><div class="kc-code">'+escapeHtml(s.code)+'</div>'+
      '<div class="kc-gr">Grade '+escapeHtml(s.grade)+'</div></div>';
  }).join('');
}

var _renderTimer = null;
function renderAll() {
  // Debounce — collapse rapid successive calls into one paint
  if (_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = setTimeout(function() {
    renderRoster();
    renderProgress();
    renderCodes();
  }, 16); // one animation frame
}

// ── MODALS ────────────────────────────────────────────────────
function showCard(code){
  var s=getStudent(code);if(!s)return;
  document.getElementById('card-body').innerHTML=
    '<div class="kc" style="max-width:220px;margin:0 auto;">'+
    '<div class="kc-crown">👑</div><div class="kc-brand">KINGTHINKERS</div>'+
    '<div class="kc-name">King '+escapeHtml(s.name)+'</div><div class="kc-div"></div>'+
    '<div class="kc-lbl">King Code</div><div class="kc-code">'+escapeHtml(code)+'</div>'+
    '<div class="kc-gr">Grade '+escapeHtml(s.grade)+'</div></div>';
  document.getElementById('card-modal').classList.add('open');
}

function showProg(code){
  _progCode=code;
  var s=getStudent(code);if(!s)return;
  document.getElementById('pm-name').textContent=s.name;
  var p=getMerged(code);
  var worlds={};
  MISSIONS.forEach(function(m){if(!worlds[m.world])worlds[m.world]=[];worlds[m.world].push(m)});
  var html='';
  Object.keys(worlds).forEach(function(w){
    html+='<div class="m-world">⚔️ '+w+'</div>';
    worlds[w].forEach(function(m){
      var done=!!p[m.id];
      html+='<label class="m-check">'+
        '<input type="checkbox" '+(done?'checked':'')+' data-id="'+escapeHtml(m.id)+'" data-xp="'+m.xp+'">'+
        '<div class="m-info"><div class="m-name">'+escapeHtml(m.name)+'</div><div class="m-meta">'+escapeHtml(m.type)+' · +'+m.xp+' XP</div></div>'+
        (done?'<span style="color:var(--green);">✅</span>':'')+
      '</label>';
    });
  });
  document.getElementById('pm-list').innerHTML=html;
  document.querySelectorAll('#pm-list input[type=checkbox]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var id=cb.getAttribute('data-id');var xp=parseInt(cb.getAttribute('data-xp'));
      var manual=getManProg(_progCode);var st=getStudent(_progCode);
      // Use server-side idempotent mark — prevents XP double counting
      db_teacherMarkMission(_progCode, id, xp, cb.checked).then(function(result){
        if(result && result.missions){
          localStorage.setItem('kt_quest_progress_'+_progCode, JSON.stringify(result.missions));
        }
        toast('✅ Saved!');
        renderAll();
      }).catch(function(e){
        // Fallback: update locally only
        if(cb.checked){
          manual[id]={completedAt:Date.now(),manual:true};
        } else {
          delete manual[id];
        }
        saveManProg(_progCode,manual);
        toast('⚠️ Saved locally — sync when online');
        renderAll();
      });
    });
  });
  document.getElementById('prog-modal').classList.add('open');
}

// ── SETTINGS ──────────────────────────────────────────────────
function loadSettingsForm(){
  var s=getSettings();
  if(s.teacherName)document.getElementById('s-teacher').value=s.teacherName;
  if(s.classCode)document.getElementById('s-class').value=s.classCode;
  if(s.schoolName)document.getElementById('s-school').value=s.schoolName;
}

// ── WIRE BUTTONS ─────────────────────────────────────────────
var _wired = false;
function wireButtons() {
  if (_wired) return;
  _wired = true;
  function on(id, fn) {
    var el = document.getElementById(id);
    if (el) {
      el.onclick = null;
      el.addEventListener('click', fn);
    }
    else { console.warn('Button not found: ' + id); }
  }

  // ── SORT BUTTONS ─────────────────────────────────────────────
  on('sort-name',     function(){ setSort('name'); });
  on('sort-progress', function(){ setSort('progress'); });
  on('sort-xp',       function(){ setSort('xp'); });
  on('sort-risk',     function(){ setSort('risk'); });

  // ── ADD STUDENT ───────────────────────────────────────────────
  on('add-btn',  doAdd);
  on('bulk-btn', doBulk);

  // ── PRINT KING CARDS ──────────────────────────────────────────
  on('print-cards-btn', printKingCards);
  // Also wire the topbar print button (prints everything)
  var topPrint = document.querySelector('.t-link[onclick*="print"]');
  if (topPrint) topPrint.onclick = function(){ window.print(); };

  // ── MODALS ────────────────────────────────────────────────────
  on('card-close-btn', function(){ document.getElementById('card-modal').classList.remove('open'); });
  on('prog-close-btn', function(){ document.getElementById('prog-modal').classList.remove('open'); renderAll(); });

  // ── SETTINGS ─────────────────────────────────────────────────
  on('save-settings-btn', saveSettingsNow);
  on('sync-btn', function(){ syncFromSupabase(); });
  on('sample-btn', loadSampleClass);
  on('clear-btn', clearAllData);

  on('sample-btn', function(){ loadSampleStudents(); });

  on('clear-btn', function(){
    if (!confirm('Delete ALL student data? This cannot be undone.')) return;
    rosterState.forEach(function(s){ localStorage.removeItem('kt_student_' + s.code); });
    rosterState = [];
    saveCachedRoster([]);
    localStorage.removeItem('kt_roster');
    toast('🗑️ All data cleared');
    renderAll();
  });

  // ── TEACHER INFO + LOGOUT ─────────────────────────────────────
  if (_teacherSession) {
    var nameEl = document.getElementById('teacher-name-display');
    if (nameEl) nameEl.textContent = (_teacherSession.name || _teacherSession.username) + ' · ' + (_teacherSession.classCode || '');
  }

  on('logout-btn', logOut);

  // ── EVENT DELEGATION for roster cards ──────────────────────
  // Handles all data-action buttons without inline onclick escaping issues
  document.addEventListener('click', function(e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    var code   = el.getAttribute('data-code');
    if (!code) return;
    if (action === 'prog') showProg(code);
    if (action === 'card') showCard(code);
    if (action === 'del')  removeStudent(code);
  });
}

// Boot — runs immediately since script is at bottom of body
(function boot() {
  // Debug: log session state to help diagnose 401s
  var sess = getTeacherSession();
  if (sess) {
    console.log('✅ Teacher session loaded:', sess.username, '| Token:', sess.token ? 'present' : 'MISSING');
    if (!sess.token) {
      console.warn('⚠️ Session has no token — API calls may fail with 401. Re-login recommended.');
    }
  } else {
    console.warn('❌ No teacher session found');
  }
  setRosterState(getCachedRoster());
  renderAll();
  loadSettingsForm();
  wireButtons();
  syncFromSupabase(true); // silent=true — no toast, no flicker on load
})();

function saveSettingsNow() {
  var t = document.getElementById('s-teacher');
  var c = document.getElementById('s-class');
  var sc = document.getElementById('s-school');
  if (t)  putSetting('teacherName', t.value);
  if (c)  putSetting('classCode',   c.value);
  if (sc) putSetting('schoolName',  sc.value);
  toast('✅ Settings saved!');
}

function loadSampleClass() {
  loadSampleStudents();
}

function clearAllData() {
  if (!confirm('Delete ALL student data? This cannot be undone.')) return;
  rosterState.forEach(function(s){
    localStorage.removeItem('kt_student_' + s.code);
    localStorage.removeItem('kt_quest_progress_' + s.code);
    localStorage.removeItem('kt_manual_' + s.code);
  });
  rosterState = [];
  saveCachedRoster([]);
  rosterState.forEach(function(s){ localStorage.removeItem('kt_student_' + s.code); });
  rosterState = [];
  saveCachedRoster([]);
  localStorage.removeItem('kt_roster');
  toast('🗑️ All data cleared');
  renderAll();
}

function printKingCards() {
  document.body.classList.add('print-cards-only');
  var codesEl = document.getElementById('codes');
  if (codesEl) codesEl.style.display = 'block';
  window.print();
  document.body.classList.remove('print-cards-only');
}

function logOut() {
  if (confirm('Log out of Teacher Roster?')) {
    if (typeof kt_clearTeacherSession === 'function') {
      kt_clearTeacherSession();
    } else {
      sessionStorage.removeItem('kt_teacher');
    }
    window.location.href = 'kingthinkers-teacher-login.html';
  }
}

async function syncFromSupabase(silent) {
  // silent=true on boot — no toast, no flicker
  if (!silent) toast('🔄 Syncing from cloud…');
  if (typeof db_getRosterWithProgress !== 'function') {
    if (!silent) toast('⚠️ Sync service unavailable');
    return;
  }

  try {
    var students = await db_getRosterWithProgress();
    var progressByCode = {};
    (students || []).forEach(function(s){
      if (s && s.code && s.progress) progressByCode[s.code] = s.progress;
    });
    setRosterState(students || []);
    rosterState.forEach(function(s) {
      saveStudentLocal(s.code, s);
      if (progressByCode[s.code] && Object.keys(progressByCode[s.code]).length > 0) {
        localStorage.setItem('kt_quest_progress_' + s.code, JSON.stringify(progressByCode[s.code]));

  try {
    var students = await db_getRosterWithProgress();
    setRosterState(students || []);
    rosterState.forEach(function(s, idx) {
      var src = students && students[idx] ? students[idx] : {};
      saveStudentLocal(s.code, s);
      if (src.progress && Object.keys(src.progress).length > 0) {
        localStorage.setItem('kt_quest_progress_' + s.code, JSON.stringify(src.progress));
      }
    });
    persistRosterCache();
    if (!silent) {
      if (!rosterState.length) toast('☁️ No students found in cloud yet');
      else toast('✅ Synced ' + rosterState.length + ' students from cloud!');
    }
    renderAll();

  } catch(e) {
    var cached = getCachedRoster();
    if (cached && cached.length) {
      setRosterState(cached);
      renderAll();
      if (!silent) toast('⚠️ Cloud unavailable — using cached roster');
    } else if (!silent) {
      toast('⚠️ Sync failed — no cache available');
    }
    console.warn('syncFromSupabase failed:', e);
  }
}
