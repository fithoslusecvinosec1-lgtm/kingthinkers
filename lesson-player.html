<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>KingThinkers Lesson</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0D0D1C; --panel:#161628; --card:#1E1E35; --card2:#252540;
      --border:rgba(255,255,255,.08);
      --gold:#F5A800; --amber:#FF6B1A; --green:#00C48C;
      --sky:#38BDF8; --rose:#FB7185; --white:#FFFFFF; --muted:rgba(255,255,255,.55);
      --f-d:'Baloo 2',cursive; --f-b:'Nunito',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--ink);color:var(--white);font-family:var(--f-b)}
    body{overflow:hidden}

    #app{
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      max-width:900px;
      margin:0 auto;
    }

    .topbar{
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 16px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
    }
    .brand{font-family:var(--f-d);font-size:18px;font-weight:900;color:var(--gold)}
    .top-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      font-size:11px;font-weight:900;
      border-radius:999px;padding:5px 10px;
      border:1px solid var(--border);background:rgba(255,255,255,.05)
    }
    .pill.gold{color:var(--gold);border-color:rgba(245,168,0,.25);background:rgba(245,168,0,.12)}
    .pill.green{color:var(--green);border-color:rgba(0,196,140,.25);background:rgba(0,196,140,.12)}
    .top-btn{
      border:none;border-radius:10px;padding:8px 12px;
      background:rgba(255,255,255,.07);color:var(--white);
      font-family:var(--f-b);font-size:12px;font-weight:800;cursor:pointer
    }

    .progress-wrap{
      flex-shrink:0;
      padding:12px 16px 0;
      background:linear-gradient(to bottom, var(--panel), transparent);
    }
    .progress-track{
      height:8px;border-radius:999px;overflow:hidden;
      background:rgba(255,255,255,.08)
    }
    .progress-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--gold),var(--amber));
      transition:width .3s ease;
    }

    .content{
      flex:1;
      overflow-y:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
    }

    .kicker{
      font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
      color:var(--green);margin-bottom:8px;
    }
    .title{
      font-family:var(--f-d);font-size:28px;font-weight:900;line-height:1.1;color:var(--gold);
      margin-bottom:8px;
    }
    .sub{
      font-size:14px;line-height:1.6;color:rgba(255,255,255,.82);
    }

    .sage{
      background:rgba(56,189,248,.10);
      border:1px solid rgba(56,189,248,.22);
      color:#dff4ff;
      border-radius:14px;
      padding:12px 14px;
      margin-top:12px;
      font-size:13px;
      line-height:1.55;
    }

    .section-title{
      font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--white);
      margin-bottom:10px;
    }

    .passage p{
      font-size:16px;line-height:1.9;color:rgba(255,255,255,.90);
      margin-bottom:12px;
    }

    .vocab-list{
      margin-top:14px;display:grid;gap:8px;
    }
    .vocab-item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:14px;
      line-height:1.55;
    }
    .vocab-item strong{color:var(--sky)}

    .q-prompt{
      font-size:20px;font-weight:900;line-height:1.4;margin-bottom:8px;
    }
    .q-hint{
      font-size:13px;color:var(--muted);margin-bottom:14px;
    }

    .choices{display:grid;gap:10px}
    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--white);
      border-radius:14px;
      padding:14px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .choice:hover{transform:translateY(-1px);border-color:rgba(245,168,0,.28)}
    .choice.correct{border-color:rgba(0,196,140,.45);background:rgba(0,196,140,.12)}
    .choice.wrong{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.12)}
    .choice:disabled{cursor:default;opacity:.95}

    .feedback{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;line-height:1.6;
      display:none;
    }
    .feedback.show{display:block}
    .feedback.good{background:rgba(0,196,140,.12);border:1px solid rgba(0,196,140,.24)}
    .feedback.bad{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.24)}

    .btn-row{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;
    }
    .btn{
      border:none;border-radius:12px;padding:12px 16px;
      font-family:var(--f-b);font-size:14px;font-weight:900;cursor:pointer;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--gold),var(--amber));
      color:#111;
    }
    .btn-secondary{
      background:rgba(255,255,255,.08);
      color:var(--white);
      border:1px solid var(--border);
    }

    .complete-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }
    .stat{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      text-align:center;
    }
    .stat-num{
      font-family:var(--f-d);font-size:26px;font-weight:900;color:var(--gold)
    }
    .stat-label{
      font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em
    }

    .match-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .match-col{
      display:grid;gap:8px;
    }
    .match-item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:14px;font-weight:800;
      cursor:pointer;
      transition:border-color .12s ease, background .12s ease;
    }
    .match-item.selected{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.12)}
    .match-item.matched{border-color:rgba(0,196,140,.4);background:rgba(0,196,140,.12);cursor:default}
    .match-item.wrong{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.12)}

    @media (max-width: 640px){
      .title{font-size:24px}
      .q-prompt{font-size:18px}
      .complete-grid{grid-template-columns:1fr}
      .match-grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start}
    }
  </style>

  <script src="kt-db.js"></script>
  <script src="kt-audio.js"></script>
  <script src="kt-sage-prompts.js"></script>

  <!-- lesson packs -->
  <script src="lessons-egypt.js"></script>

  <!-- engine -->
  <script src="lesson-engine.js"></script>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="brand">👑 KingThinkers</div>
      <div class="top-meta">
        <div class="pill gold" id="lesson-xp-pill">+0 XP</div>
        <div class="pill green" id="lesson-crowns-pill">👑 0</div>
        <button class="top-btn" onclick="KTLessonEngine.exitToDashboard()">← Back</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="lesson-progress-fill"></div>
      </div>
    </div>

    <div class="content" id="lesson-content"></div>
  </div>
</body>
</html>
