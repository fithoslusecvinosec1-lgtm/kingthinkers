<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>KingThinkers Lesson</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0D0D1C; --panel:#161628; --card:#1E1E35; --card2:#252540;
      --border:rgba(255,255,255,.08);
      --gold:#F5A800; --amber:#FF6B1A; --green:#00C48C;
      --sky:#38BDF8; --rose:#FB7185; --white:#FFFFFF; --muted:rgba(255,255,255,.55);
      --f-d:'Baloo 2',cursive; --f-b:'Nunito',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--ink);color:var(--white);font-family:var(--f-b)}
    body{overflow:hidden}

    #app{
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      max-width:900px;
      margin:0 auto;
    }

    .topbar{
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 16px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
    }
    .brand{font-family:var(--f-d);font-size:18px;font-weight:900;color:var(--gold)}
    .top-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      font-size:11px;font-weight:900;
      border-radius:999px;padding:5px 10px;
      border:1px solid var(--border);background:rgba(255,255,255,.05)
    }
    .pill.gold{color:var(--gold);border-color:rgba(245,168,0,.25);background:rgba(245,168,0,.12)}
    .pill.green{color:var(--green);border-color:rgba(0,196,140,.25);background:rgba(0,196,140,.12)}
    .top-btn{
      border:none;border-radius:10px;padding:8px 12px;
      background:rgba(255,255,255,.07);color:var(--white);
      font-family:var(--f-b);font-size:12px;font-weight:800;cursor:pointer
    }

    .progress-wrap{
      flex-shrink:0;
      padding:12px 16px 0;
      background:linear-gradient(to bottom, var(--panel), transparent);
    }
    .progress-track{
      height:8px;border-radius:999px;overflow:hidden;
      background:rgba(255,255,255,.08)
    }
    .progress-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--gold),var(--amber));
      transition:width .3s ease;
    }

    .content{
      flex:1;
      overflow-y:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
    }

    .kicker{
      font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
      color:var(--green);margin-bottom:8px;
    }
    .title{
      font-family:var(--f-d);font-size:28px;font-weight:900;line-height:1.1;color:var(--gold);
      margin-bottom:8px;
    }
    .sub{
      font-size:14px;line-height:1.6;color:rgba(255,255,255,.82);
    }

    .sage{
      background:rgba(56,189,248,.10);
      border:1px solid rgba(56,189,248,.22);
      color:#dff4ff;
      border-radius:14px;
      padding:12px 14px;
      margin-top:12px;
      font-size:13px;
      line-height:1.55;
    }

    .section-title{
      font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--white);
      margin-bottom:10px;
    }

    .passage p{
      font-size:16px;line-height:1.9;color:rgba(255,255,255,.90);
      margin-bottom:12px;
    }

    .vocab-list{
      margin-top:14px;display:grid;gap:8px;
    }
    .vocab-item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:14px;
      line-height:1.55;
    }
    .vocab-item strong{color:var(--sky)}

    .q-prompt{
      font-size:20px;font-weight:900;line-height:1.4;margin-bottom:8px;
    }
    .q-hint{
      font-size:13px;color:var(--muted);margin-bottom:14px;
    }

    .choices{display:grid;gap:10px}
    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--white);
      border-radius:14px;
      padding:14px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .choice:hover{transform:translateY(-1px);border-color:rgba(245,168,0,.28)}
    .choice.correct{border-color:rgba(0,196,140,.45);background:rgba(0,196,140,.12)}
    .choice.wrong{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.12)}
    .choice:disabled{cursor:default;opacity:.95}

    .feedback{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;line-height:1.6;
      display:none;
    }
    .feedback.show{display:block}
    .feedback.good{background:rgba(0,196,140,.12);border:1px solid rgba(0,196,140,.24)}
    .feedback.bad{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.24)}

    .btn-row{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;
    }
    .btn{
      border:none;border-radius:12px;padding:12px 16px;
      font-family:var(--f-b);font-size:14px;font-weight:900;cursor:pointer;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--gold),var(--amber));
      color:#111;
    }
    .btn-secondary{
      background:rgba(255,255,255,.08);
      color:var(--white);
      border:1px solid var(--border);
    }

    .complete-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }
    .stat{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      text-align:center;
    }
    .stat-num{
      font-family:var(--f-d);font-size:26px;font-weight:900;color:var(--gold)
    }
    .stat-label{
      font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em
    }

    .match-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .match-col{
      display:grid;gap:8px;
    }
    .match-item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:14px;font-weight:800;
      cursor:pointer;
      transition:border-color .12s ease, background .12s ease;
    }
    .match-item.selected{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.12)}
    .match-item.matched{border-color:rgba(0,196,140,.4);background:rgba(0,196,140,.12);cursor:default}
    .match-item.wrong{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.12)}

    @media (max-width: 640px){
      .title{font-size:24px}
      .q-prompt{font-size:18px}
      .complete-grid{grid-template-columns:1fr}
      .match-grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start}
    }
  </style>

  <script src="/kingthinkers/kt-db.js"></script>
  <script src="/kingthinkers/kt-audio.js"></script>
  <script src="/kingthinkers/kt-sage-prompts.js"></script>

  <!-- lesson packs -->
  <script src="/kingthinkers/lessons-egypt.js"></script>

  <!-- engine -->
  <script src="/kingthinkers/lesson-engine.js"></script>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="brand">👑 KingThinkers</div>
      <div class="top-meta">
        <div class="pill gold" id="lesson-xp-pill">+0 XP</div>
        <div class="pill green" id="lesson-crowns-pill">👑 0</div>
        <button class="top-btn" type="button" onclick="KTLessonEngine.exitToDashboard()">← Back</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="lesson-progress-fill"></div>
      </div>
    </div>

    <div class="content" id="lesson-content"></div>
  </div>

  <div id="sage-float-btn" style="
    position:fixed;bottom:80px;right:16px;z-index:2000;
    width:54px;height:54px;border-radius:50%;
    background:linear-gradient(135deg,#1E3A2A,#00C48C);
    border:2px solid rgba(0,196,140,.5);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;cursor:pointer;
    box-shadow:0 4px 20px rgba(0,196,140,.35);
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  ">🤖</div>

  <div id="sage-panel" style="
    position:fixed;bottom:144px;right:12px;z-index:2001;
    width:min(340px,92vw);
    background:#0F0F24;
    border:1px solid rgba(0,196,140,.28);
    border-radius:20px;
    padding:16px;
    box-shadow:0 12px 40px rgba(0,0,0,.55);
    display:none;
  ">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:20px;">🤖</span>
        <span style="font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:#00C48C;">Sage</span>
        <span style="width:8px;height:8px;border-radius:50%;background:#00C48C;display:inline-block;"></span>
      </div>
      <button id="sage-close-btn" type="button" style="
        background:none;border:none;color:rgba(255,255,255,.45);
        font-size:18px;cursor:pointer;padding:0 4px;
      ">✕</button>
    </div>

    <div id="sage-panel-messages" style="
      max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;
      margin-bottom:10px;
    "></div>

    <div style="display:flex;gap:8px;">
      <input
        type="text"
        id="sage-panel-input"
        placeholder="Ask Sage for help…"
        style="
          flex:1;background:#0B0B1E;border:1px solid rgba(255,255,255,.1);
          border-radius:10px;padding:10px 12px;font-size:13px;color:#fff;
          outline:none;font-family:inherit;-webkit-appearance:none;
        "
      >
      <button id="sage-send-btn" type="button" style="
        background:linear-gradient(135deg,#00C48C,#38BDF8);
        border:none;border-radius:8px;padding:0 14px;font-size:16px;
        cursor:pointer;flex-shrink:0;
      ">➤</button>
    </div>

    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
      <button id="sage-hint-btn" type="button" style="
        background:#16163A;border:1px solid rgba(0,196,140,.2);
        border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;
        color:#00C48C;cursor:pointer;
      ">💡 Hint</button>

      <button id="sage-explain-btn" type="button" style="
        background:#16163A;border:1px solid rgba(0,196,140,.2);
        border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;
        color:#00C48C;cursor:pointer;
      ">🤔 Explain</button>

      <button id="sage-celebrate-btn" type="button" style="
        background:#16163A;border:1px solid rgba(245,168,0,.2);
        border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;
        color:#F5A800;cursor:pointer;
      ">🎉 Celebrate</button>
    </div>
  </div>

  <script>
    (function () {
      var sageState = {
        history: [],
        busy: false,
        open: false,
        initialized: false,
        fallback: 'Sage is offline, King.'
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function safeText(value) {
        return value == null ? '' : String(value);
      }

      function getGreeting() {
        return 'Hey King! I’m Sage. Ask for a hint or a quick explanation. 👑';
      }

      function getLessonContext() {
        try {
          if (window.KTLessonEngine && typeof window.KTLessonEngine.getSageContext === 'function') {
            return window.KTLessonEngine.getSageContext();
          }
        } catch (e) {
          console.warn('getSageContext failed:', e);
        }

        return {
          lessonTitle: document.title || 'Lesson',
          subject: 'lesson',
          currentPhase: 'lesson',
          currentQuestion: '',
          answerChoices: [],
          studentAlreadyWrong: false
        };
      }

      function makeMessage(role, text) {
        var div = document.createElement('div');
        div.style.marginBottom = '8px';
        div.style.padding = '10px 12px';
        div.style.borderRadius = role === 'user' ? '12px 12px 4px 12px' : '12px 12px 12px 4px';
        div.style.background = role === 'user' ? 'rgba(245,168,0,.12)' : '#16163A';
        div.style.border = role === 'user'
          ? '1px solid rgba(245,168,0,.2)'
          : '1px solid rgba(0,196,140,.15)';
        div.style.color = '#fff';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.5';
        div.textContent = safeText(text);
        return div;
      }

      function makeTyping() {
        var div = document.createElement('div');
        div.id = 'sage-panel-typing';
        div.style.marginBottom = '8px';
        div.style.padding = '10px 12px';
        div.style.borderRadius = '12px 12px 12px 4px';
        div.style.background = '#16163A';
        div.style.border = '1px solid rgba(0,196,140,.15)';
        div.style.color = 'rgba(255,255,255,.8)';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.5';
        div.textContent = 'Sage is thinking…';
        return div;
      }

      function renderHistory() {
        var wrap = byId('sage-panel-messages');
        if (!wrap) return;

        wrap.innerHTML = '';
        for (var i = 0; i < sageState.history.length; i++) {
          wrap.appendChild(makeMessage(sageState.history[i].role, sageState.history[i].content));
        }

        if (sageState.busy) {
          wrap.appendChild(makeTyping());
        }

        wrap.scrollTop = wrap.scrollHeight;
      }

      function appendMessage(role, text) {
        var wrap = byId('sage-panel-messages');
        if (!wrap) return;
        wrap.appendChild(makeMessage(role, text));
        wrap.scrollTop = wrap.scrollHeight;
      }

      function showTyping() {
        var wrap = byId('sage-panel-messages');
        if (!wrap || byId('sage-panel-typing')) return;
        wrap.appendChild(makeTyping());
        wrap.scrollTop = wrap.scrollHeight;
      }

      function hideTyping() {
        var typing = byId('sage-panel-typing');
        if (typing) typing.remove();
      }

      function ensureSession() {
        if (sageState.initialized) {
          renderHistory();
          return;
        }
        sageState.initialized = true;
        sageState.history = [{ role: 'assistant', content: getGreeting() }];
        renderHistory();
      }

      function openPanel() {
        var panel = byId('sage-panel');
        if (!panel) return;
        sageState.open = true;
        panel.style.display = 'block';
        ensureSession();
      }

      function closePanel() {
        var panel = byId('sage-panel');
        if (!panel) return;
        sageState.open = false;
        panel.style.display = 'none';
      }

      function togglePanel() {
        if (sageState.open) closePanel();
        else openPanel();
      }

      async function sendMessage(prefill) {
        if (sageState.busy) return;

        var input = byId('sage-panel-input');
        var text = prefill || (input ? input.value.trim() : '');
        if (!text) return;
        if (input) input.value = '';

        if (window.KTAudio && typeof window.KTAudio.tap === 'function') {
          try { window.KTAudio.tap(); } catch (e) {}
        }

        openPanel();

        var cleanText = String(text).trim();
        sageState.history.push({ role: 'user', content: cleanText });
        appendMessage('user', cleanText);

        sageState.busy = true;
        showTyping();

        var reply = null;

        try {
          var ctx = getLessonContext();
          var systemPrompt = '';

          if (window.KTSagePrompts) {
            var mode = typeof window.KTSagePrompts.detectSageMode === 'function'
              ? window.KTSagePrompts.detectSageMode(cleanText, {
                  inLesson: true,
                  studentAlreadyWrong: !!ctx.studentAlreadyWrong
                })
              : 'hint';

            systemPrompt = typeof window.KTSagePrompts.buildLessonSagePromptFromContext === 'function'
              ? window.KTSagePrompts.buildLessonSagePromptFromContext(cleanText, {
                  lessonTitle: ctx.lessonTitle || 'Lesson',
                  subject: ctx.subject || 'lesson',
                  currentPhase: ctx.currentPhase || 'lesson',
                  currentQuestion: ctx.currentQuestion || '',
                  answerChoices: Array.isArray(ctx.answerChoices) ? ctx.answerChoices : [],
                  studentAlreadyWrong: !!ctx.studentAlreadyWrong,
                  mode: mode
                })
              : '';
          }

          if (typeof window.kt_sage === 'function') {
            reply = await window.kt_sage(sageState.history, systemPrompt);
          } else {
            reply = 'I can open, but the Sage chat service is not loaded yet.';
          }
        } catch (e) {
          console.warn('Sage request failed:', e);
        }

        sageState.busy = false;
        hideTyping();

        if (!reply) reply = sageState.fallback;

        sageState.history.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);

        if (sageState.history.length > 12) {
          sageState.history = [sageState.history[0]].concat(sageState.history.slice(-11));
        }

        if (window.KTAudio && typeof window.KTAudio.coin === 'function' && reply !== sageState.fallback) {
          try { window.KTAudio.coin(); } catch (e) {}
        }
      }

      function wireSage() {
        var floatBtn = byId('sage-float-btn');
        var closeBtn = byId('sage-close-btn');
        var sendBtn = byId('sage-send-btn');
        var input = byId('sage-panel-input');
        var hintBtn = byId('sage-hint-btn');
        var explainBtn = byId('sage-explain-btn');
        var celebrateBtn = byId('sage-celebrate-btn');

        if (floatBtn && !floatBtn.dataset.bound) {
          floatBtn.dataset.bound = '1';
          floatBtn.addEventListener('click', togglePanel);
          floatBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            togglePanel();
          }, { passive: false });
        }

        if (closeBtn && !closeBtn.dataset.bound) {
          closeBtn.dataset.bound = '1';
          closeBtn.addEventListener('click', closePanel);
        }

        if (sendBtn && !sendBtn.dataset.bound) {
          sendBtn.dataset.bound = '1';
          sendBtn.addEventListener('click', function () {
            sendMessage();
          });
        }

        if (input && !input.dataset.bound) {
          input.dataset.bound = '1';
          input.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
              event.preventDefault();
              sendMessage();
            }
          });
        }

        if (hintBtn && !hintBtn.dataset.bound) {
          hintBtn.dataset.bound = '1';
          hintBtn.addEventListener('click', function () {
            sendMessage('Give me a hint for this question!');
          });
        }

        if (explainBtn && !explainBtn.dataset.bound) {
          explainBtn.dataset.bound = '1';
          explainBtn.addEventListener('click', function () {
            sendMessage("I'm confused. Can you explain this differently?");
          });
        }

        if (celebrateBtn && !celebrateBtn.dataset.bound) {
          celebrateBtn.dataset.bound = '1';
          celebrateBtn.addEventListener('click', function () {
            sendMessage('Celebrate with me!');
          });
        }
      }

      window.toggleSagePanel = togglePanel;
      window.sendSagePanel = sendMessage;

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', wireSage);
      } else {
        wireSage();
      }
    })();
  </script>
</body>
</html>
