<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>KingThinkers Lesson</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0d0f22; --panel:#171a32; --card:#1d2140; --card2:#252a4d;
      --border:rgba(255,255,255,.11);
      --gold:#f5a800; --amber:#ff6b1a; --green:#00c48c;
      --sky:#38bdf8; --rose:#fb7185; --white:#ffffff; --muted:rgba(255,255,255,.66);
      --shadow-lg:0 12px 30px rgba(4,7,20,.42); --shadow-md:0 8px 22px rgba(4,7,20,.3);
      --f-d:'Baloo 2',cursive; --f-b:'Nunito',sans-serif;
      --world-bg-top:#203056;
      --world-bg-mid:#17233f;
      --world-bg-bottom:#0d1023;
      --world-glow:rgba(245,168,0,.2);
      --world-glow-secondary:rgba(56,189,248,.12);
      --world-haze:rgba(255,255,255,.08);
      --world-particle:rgba(255,240,194,.18);
      --world-scene-opacity:.88;
      --world-ornament-opacity:.3;
      --world-silhouette-svg:none;
      --world-silhouette:
        radial-gradient(70% 85% at 15% 100%, rgba(10,15,30,.62) 0, rgba(10,15,30,.62) 42%, transparent 43%),
        radial-gradient(78% 90% at 86% 100%, rgba(10,15,30,.6) 0, rgba(10,15,30,.6) 46%, transparent 47%),
        linear-gradient(180deg, transparent 0 62%, rgba(7,10,21,.62) 62% 100%);
      --world-ornament-svg:none;
      --world-ornament:none;
      --world-card-glow:rgba(255,255,255,.04);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 20% -10%, rgba(42,47,94,.72) 0, transparent 40%),
        radial-gradient(circle at 85% 0%, rgba(45,31,71,.62) 0, transparent 34%),
        linear-gradient(180deg, var(--world-bg-top) 0%, var(--world-bg-mid) 42%, var(--world-bg-bottom) 100%);
      color:var(--white);
      font-family:var(--f-b);
      overflow-x:hidden;
      overflow-y:auto;
    }
    body{
      position:relative;
      isolation:isolate;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-3;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 28%, rgba(6,9,18,.08) 0, rgba(6,9,18,.18) 28%, rgba(6,9,18,.5) 68%, rgba(6,9,18,.78) 100%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.18));
    }

    .lesson-atmosphere{
      position:fixed;
      inset:0;
      z-index:-4;
      pointer-events:none;
      overflow:hidden;
    }
    .lesson-atmosphere-layer{
      position:absolute;
      inset:-8%;
      pointer-events:none;
    }
    .lesson-atmosphere-sky{
      background:
        radial-gradient(circle at 18% 18%, var(--world-glow) 0, transparent 34%),
        radial-gradient(circle at 82% 16%, var(--world-glow-secondary) 0, transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 40%);
      filter:saturate(108%);
    }
    .lesson-atmosphere-haze{
      opacity:.48;
      background:
        radial-gradient(42% 24% at 24% 34%, var(--world-haze) 0, transparent 70%),
        radial-gradient(36% 18% at 72% 26%, rgba(255,255,255,.07) 0, transparent 72%),
        radial-gradient(44% 22% at 56% 62%, rgba(255,255,255,.05) 0, transparent 74%);
      animation:atmosphereDrift 34s ease-in-out infinite alternate;
    }
    .lesson-atmosphere-silhouette{
      inset:auto -4% -4% -4%;
      height:68vh;
      min-height:360px;
      background-image:var(--world-silhouette-svg), var(--world-silhouette);
      background-repeat:no-repeat,no-repeat;
      background-size:100% 100%,cover;
      background-position:center bottom,center bottom;
      opacity:var(--world-scene-opacity);
      transform:translate3d(0,0,0);
      animation:atmosphereParallax 42s ease-in-out infinite alternate;
    }
    .lesson-atmosphere-ornament{
      background-image:var(--world-ornament-svg), var(--world-ornament);
      background-repeat:no-repeat,no-repeat;
      background-size:100% 100%,cover;
      background-position:center,center;
      opacity:var(--world-ornament-opacity);
      mix-blend-mode:screen;
      animation:atmosphereDriftSlow 46s ease-in-out infinite alternate;
    }
    .lesson-atmosphere-motes{
      opacity:.38;
      background-image:
        radial-gradient(circle, var(--world-particle) 0 1.2px, transparent 1.9px),
        radial-gradient(circle, rgba(255,255,255,.09) 0 1px, transparent 1.7px),
        radial-gradient(circle, rgba(255,230,160,.08) 0 1.1px, transparent 1.8px);
      background-size:180px 180px, 240px 240px, 320px 320px;
      background-position:0 0, 30px 60px, 80px 120px;
      animation:particleFloat 44s linear infinite;
    }
    .lesson-atmosphere-vignette{
      background:
        radial-gradient(54% 40% at 50% 52%, transparent 0 48%, rgba(4,6,14,.12) 68%, rgba(4,6,14,.42) 100%),
        linear-gradient(180deg, rgba(8,10,18,.12), rgba(8,10,18,.42));
    }

    @keyframes atmosphereDrift{
      from{transform:translate3d(-1.5%, 0, 0) scale(1.02)}
      to{transform:translate3d(1.5%, -1.2%, 0) scale(1.08)}
    }
    @keyframes atmosphereDriftSlow{
      from{transform:translate3d(0, 0, 0)}
      to{transform:translate3d(-1.5%, 1.5%, 0)}
    }
    @keyframes atmosphereParallax{
      from{transform:translate3d(0, 0, 0) scale(1)}
      to{transform:translate3d(0, -1.2%, 0) scale(1.03)}
    }
    @keyframes particleFloat{
      from{transform:translate3d(0, 0, 0)}
      to{transform:translate3d(-120px, 40px, 0)}
    }

    #app{
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      max-width:920px;
      margin:0 auto;
      position:relative;
      z-index:1;
      overflow-x:hidden;
    }

    .topbar{
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 16px;
      background:linear-gradient(180deg, rgba(23,26,50,.98), rgba(23,26,50,.88));
      border-bottom:1px solid var(--border);
      box-shadow:var(--shadow-md);
    }
    .brand{font-family:var(--f-d);font-size:20px;font-weight:900;color:var(--gold);letter-spacing:.02em;text-shadow:0 2px 8px rgba(245,168,0,.26)}
    .top-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      font-size:11px;font-weight:900;
      border-radius:999px;padding:5px 10px;
      border:1px solid var(--border);background:rgba(255,255,255,.07)
    }
    .pill.gold{color:var(--gold);border-color:rgba(245,168,0,.25);background:rgba(245,168,0,.12)}
    .pill.green{color:var(--green);border-color:rgba(0,196,140,.25);background:rgba(0,196,140,.12)}
    .top-btn{
      border:1px solid var(--border);border-radius:10px;padding:8px 12px;
      background:rgba(255,255,255,.06);color:var(--muted);
      font-family:var(--f-b);font-size:12px;font-weight:800;cursor:pointer
    }
    .top-btn:hover{color:var(--white);border-color:rgba(255,255,255,.2)}

    .progress-wrap{
      flex-shrink:0;
      padding:14px 16px 4px;
      background:linear-gradient(to bottom, rgba(23,26,50,.75), transparent);
    }
    .progress-track{
      height:10px;border-radius:999px;overflow:hidden;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.08)
    }
    .progress-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--gold),var(--amber));
      transition:width .3s ease;
    }

    .content{
      flex:1;
      min-height:0;
      overflow:visible;
      padding:20px 16px calc(120px + env(safe-area-inset-bottom, 0px));
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(9,12,27,.88), rgba(15,19,39,.96)),
        var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:22px;
      box-shadow:
        0 24px 54px rgba(3,6,16,.5),
        0 0 0 1px rgba(255,255,255,.015),
        0 0 60px var(--world-card-glow);
      position:relative;
      overflow:hidden;
      backdrop-filter:blur(6px);
    }
    .card::before{
      content:"";
      position:absolute;
      left:0;right:0;top:0;
      height:3px;
      background:linear-gradient(90deg, rgba(245,168,0,.7), rgba(56,189,248,.45), rgba(0,196,140,.4));
      opacity:.7;
    }

    .kicker{
      font-size:11px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;
      color:var(--green);margin-bottom:8px;
    }
    .title{
      font-family:var(--f-d);font-size:32px;font-weight:900;line-height:1.08;color:var(--gold);
      margin-bottom:8px;
    }
    .sub{
      font-size:15px;line-height:1.7;color:rgba(255,255,255,.86);
    }

    .sage{
      background:rgba(56,189,248,.10);
      border:1px solid rgba(56,189,248,.22);
      color:#dff4ff;
      border-radius:12px;
      padding:12px 14px;
      margin-top:12px;
      font-size:13px;
      line-height:1.55;
    }

    /* â”€â”€ Phase 2 Step-by-Step Reveal â”€â”€ */
    .phase2-step{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      animation:stepFadeIn .25s ease;
    }
    .phase2-step-new{
      border-color:rgba(245,168,0,.35);
      background:rgba(245,168,0,.06);
    }
    .phase2-step-label{
      font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
      color:var(--gold);margin-bottom:6px;
    }
    .phase2-step-display{
      font-size:17px;font-weight:800;color:var(--white);margin-bottom:4px;
    }
    .phase2-step-explanation{
      font-size:13px;line-height:1.6;color:rgba(255,255,255,.80);margin-top:4px;
    }
    .phase2-progress{
      font-size:12px;font-weight:800;color:var(--muted);
      display:flex;align-items:center;margin-left:4px;
    }
    @keyframes stepFadeIn{
      from{opacity:0;transform:translateY(6px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* â”€â”€ King Mode Streak Banner â”€â”€ */
    .king-mode-banner{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:linear-gradient(135deg,var(--gold),var(--amber));
      color:#111;
      box-shadow:0 8px 16px rgba(245,168,0,.28);
      font-family:var(--f-d);
      font-size:16px;
      font-weight:900;
      border-radius:14px;
      padding:12px 16px;
      margin-bottom:10px;
      animation:kingModeIn .35s cubic-bezier(.34,1.56,.64,1);
      text-align:center;
    }
    @keyframes kingModeIn{
      from{opacity:0;transform:scale(.85)}
      to{opacity:1;transform:scale(1)}
    }

    /* â”€â”€ Review Mode â”€â”€ */
    .review-offer{
      background:rgba(56,189,248,.10);
      border:1px solid rgba(56,189,248,.28);
      border-radius:14px;
      padding:14px 16px;
      margin:14px 0 4px;
    }
    .review-offer-text{
      font-size:13px;
      line-height:1.6;
      color:#dff4ff;
    }
    .review-icon{
      font-size:22px;
    }

    .section-title{
      font-family:var(--f-d);font-size:24px;font-weight:900;color:var(--white);
      margin-bottom:12px;line-height:1.2;
    }

    .passage p{
      font-size:16px;line-height:1.9;color:rgba(255,255,255,.90);
      margin-bottom:12px;
    }

    .vocab-list{
      margin-top:14px;display:grid;gap:8px;
    }
    .vocab-item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:14px;
      line-height:1.55;
    }
    .vocab-item strong{color:var(--sky)}

    .q-prompt{
      font-size:22px;font-weight:900;line-height:1.35;margin-bottom:10px;
      letter-spacing:.01em;
    }
    .q-hint{
      font-size:13px;color:var(--muted);margin-bottom:16px;
    }

    .choices{display:grid;gap:10px}
    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--white);
      border-radius:16px;
      padding:15px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      min-height:52px;
      box-shadow:0 4px 12px rgba(0,0,0,.2);
      transition:transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
      touch-action:manipulation;
    }
    .choice:hover{transform:translateY(-2px);border-color:rgba(245,168,0,.5);box-shadow:0 8px 16px rgba(245,168,0,.16)}
    .choice:active{transform:translateY(0);}
    .choice.correct{border-color:rgba(0,196,140,.45);background:rgba(0,196,140,.12)}
    .choice.wrong{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.12)}
    .choice:disabled{cursor:default;opacity:.95}

    .feedback{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;line-height:1.6;
      box-shadow:0 6px 14px rgba(0,0,0,.14);
      display:none;
    }
    .feedback.show{display:block}
    .feedback.good{background:rgba(0,196,140,.18);border:1px solid rgba(0,196,140,.4);color:#dffff4}
    .feedback.bad{background:rgba(251,113,133,.18);border:1px solid rgba(251,113,133,.4);color:#ffe3e8}
    .feedback.info{background:rgba(56,189,248,.16);border:1px solid rgba(56,189,248,.34);color:#dff4ff}

    .btn-row{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;
    }
    .btn{
      border:none;border-radius:12px;padding:12px 18px;
      font-family:var(--f-b);font-size:14px;font-weight:900;cursor:pointer;
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
      min-height:46px;
      min-width:132px;
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.03)}
    .btn:active{transform:translateY(0)}
    .btn-primary{
      background:linear-gradient(135deg,var(--gold),var(--amber));
      color:#111;
      box-shadow:0 8px 16px rgba(245,168,0,.28);
    }
    .btn-secondary{
      background:rgba(255,255,255,.08);
      color:var(--white);
      border:1px solid var(--border);
      box-shadow:0 6px 12px rgba(0,0,0,.16);
    }

    .complete-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }
    .stat{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      text-align:center;
    }
    .stat-num{
      font-family:var(--f-d);font-size:26px;font-weight:900;color:var(--gold)
    }
    .stat-label{
      font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em
    }


    .visual-frame{
      margin-top:14px;padding:14px;border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      overflow-x:auto;
      overscroll-behavior-x:contain;
      -webkit-overflow-scrolling:touch;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }
    .visual-label{
      font-size:11px;font-weight:900;color:var(--muted);margin-bottom:10px;
      text-transform:uppercase;letter-spacing:.09em;
    }
    .visual-chip{
      padding:8px 10px;border-radius:999px;background:rgba(245,168,0,.14);
      border:1px solid rgba(245,168,0,.3);font-weight:800;font-size:13px;
    }
    .visual-eq{font-family:var(--f-d);font-size:28px;color:var(--gold);text-align:center;}

    .match-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .match-col{
      display:grid;gap:8px;
    }
    .match-item{
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:14px;font-weight:800;
      color:var(--white);
      cursor:pointer;
      transition:border-color .12s ease, background .12s ease;
    }
    .match-item.selected{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.12)}
    .match-item.matched{border-color:rgba(0,196,140,.4);background:rgba(0,196,140,.12);cursor:default}
    .match-item.wrong{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.12)}

    @media (max-width: 640px){
      .lesson-atmosphere-silhouette{
        min-height:300px;
        opacity:.8;
      }
      .lesson-atmosphere-ornament{opacity:.2}
      .content{padding:16px 12px calc(132px + env(safe-area-inset-bottom, 0px))}
      .card{padding:16px;border-radius:14px}
      .title{font-size:26px}
      .q-prompt{font-size:19px}
      .sub{font-size:14px;line-height:1.65}
      .passage p{font-size:15px;line-height:1.8}
      .choice{font-size:16px;padding:14px 14px}
      .btn-row .btn{flex:1 1 100%}
      .complete-grid{grid-template-columns:1fr}
      .match-grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start;padding:10px 12px}
      .top-meta{gap:6px}
      .pill{font-size:10px;padding:4px 9px}
      .top-btn{padding:7px 10px}
    }
  </style>

        "
      >
      <button id="sage-send-btn" type="button" style="
        background:linear-gradient(135deg,#00C48C,#38BDF8);
        border:none;border-radius:8px;padding:0 14px;font-size:16px;
        cursor:pointer;flex-shrink:0;
      ">➤</button>
    </div>

    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
      <button id="sage-hint-btn" type="button" style="
        background:#16163A;border:1px solid rgba(0,196,140,.2);
        border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;
        color:#00C48C;cursor:pointer;
      ">💡 Hint</button>

      <button id="sage-explain-btn" type="button" style="
        background:#16163A;border:1px solid rgba(0,196,140,.2);
        border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;
        color:#00C48C;cursor:pointer;
      ">🤔 Explain</button>

      <button id="sage-celebrate-btn" type="button" style="
        background:#16163A;border:1px solid rgba(245,168,0,.2);
        border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;
        color:#F5A800;cursor:pointer;
      ">🎉 Celebrate</button>
    </div>
  </div>

  <script>
    (function () {
      var sageState = {
        history: [],
        busy: false,
        open: false,
        initialized: false,
        fallback: 'Sage is offline, King.'
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function safeText(value) {
        return value == null ? '' : String(value);
      }

      function getGreeting() {
        return 'Hey King! I’m Sage. Ask for a hint or a quick explanation. 👑';
      }

      function getLessonContext() {
        try {
          if (window.KTLessonEngine && typeof window.KTLessonEngine.getSageContext === 'function') {
            return window.KTLessonEngine.getSageContext();
          }
        } catch (e) {
          console.warn('getSageContext failed:', e);
        }

        return {
          lessonTitle: document.title || 'Lesson',
          subject: 'lesson',
          currentPhase: 'lesson',
          currentQuestion: '',
          answerChoices: [],
          studentAlreadyWrong: false
        };
      }

      function makeMessage(role, text) {
        var div = document.createElement('div');
        div.style.marginBottom = '8px';
        div.style.padding = '10px 12px';
        div.style.borderRadius = role === 'user' ? '12px 12px 4px 12px' : '12px 12px 12px 4px';
        div.style.background = role === 'user' ? 'rgba(245,168,0,.12)' : '#16163A';
        div.style.border = role === 'user'
          ? '1px solid rgba(245,168,0,.2)'
          : '1px solid rgba(0,196,140,.15)';
        div.style.color = '#fff';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.5';
        div.textContent = safeText(text);
        return div;
      }

      function makeTyping() {
        var div = document.createElement('div');
        div.id = 'sage-panel-typing';
        div.style.marginBottom = '8px';
        div.style.padding = '10px 12px';
        div.style.borderRadius = '12px 12px 12px 4px';
        div.style.background = '#16163A';
        div.style.border = '1px solid rgba(0,196,140,.15)';
        div.style.color = 'rgba(255,255,255,.8)';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.5';
        div.textContent = 'Sage is thinking…';
        return div;
      }

      function renderHistory() {
        var wrap = byId('sage-panel-messages');
        if (!wrap) return;

        wrap.innerHTML = '';
        for (var i = 0; i < sageState.history.length; i++) {
          wrap.appendChild(makeMessage(sageState.history[i].role, sageState.history[i].content));
        }

        if (sageState.busy) {
          wrap.appendChild(makeTyping());
        }

        wrap.scrollTop = wrap.scrollHeight;
      }

      function appendMessage(role, text) {
        var wrap = byId('sage-panel-messages');
        if (!wrap) return;
        wrap.appendChild(makeMessage(role, text));
        wrap.scrollTop = wrap.scrollHeight;
      }

      function showTyping() {
        var wrap = byId('sage-panel-messages');
        if (!wrap || byId('sage-panel-typing')) return;
        wrap.appendChild(makeTyping());
        wrap.scrollTop = wrap.scrollHeight;
      }

      function hideTyping() {
        var typing = byId('sage-panel-typing');
        if (typing) typing.remove();
      }

      function ensureSession() {
        if (sageState.initialized) {
          renderHistory();
          return;
        }
        sageState.initialized = true;
        sageState.history = [{ role: 'assistant', content: getGreeting() }];
        renderHistory();
      }

      function openPanel() {
        var panel = byId('sage-panel');
        if (!panel) return;
        sageState.open = true;
        panel.style.display = 'block';
        ensureSession();
      }

      function closePanel() {
        var panel = byId('sage-panel');
        if (!panel) return;
        sageState.open = false;
        panel.style.display = 'none';
      }

      function togglePanel() {
        if (sageState.open) closePanel();
        else openPanel();
      }

      async function sendMessage(prefill) {
        if (sageState.busy) return;

        var input = byId('sage-panel-input');
        var text = prefill || (input ? input.value.trim() : '');
        if (!text) return;
        if (input) input.value = '';

        if (window.KTAudio && typeof window.KTAudio.tap === 'function') {
          try { window.KTAudio.tap(); } catch (e) {}
        }

        openPanel();

        var cleanText = String(text).trim();
        sageState.history.push({ role: 'user', content: cleanText });
        appendMessage('user', cleanText);

        sageState.busy = true;
        showTyping();

        var reply = null;

        try {
          var ctx = getLessonContext();
          var systemPrompt = '';

          if (window.KTSagePrompts) {
            var mode = typeof window.KTSagePrompts.detectSageMode === 'function'
              ? window.KTSagePrompts.detectSageMode(cleanText, {
                  inLesson: true,
                  studentAlreadyWrong: !!ctx.studentAlreadyWrong
                })
              : 'hint';

            systemPrompt = typeof window.KTSagePrompts.buildLessonSagePromptFromContext === 'function'
              ? window.KTSagePrompts.buildLessonSagePromptFromContext(cleanText, {
                  lessonTitle: ctx.lessonTitle || 'Lesson',
                  subject: ctx.subject || 'lesson',
                  currentPhase: ctx.currentPhase || 'lesson',
                  currentQuestion: ctx.currentQuestion || '',
                  answerChoices: Array.isArray(ctx.answerChoices) ? ctx.answerChoices : [],
                  studentAlreadyWrong: !!ctx.studentAlreadyWrong,
                  mode: mode
                })
              : '';
          }

          if (typeof window.kt_sage === 'function') {
            reply = await window.kt_sage(sageState.history, systemPrompt);
          } else {
            reply = 'I can open, but the Sage chat service is not loaded yet.';
          }
        } catch (e) {
          console.warn('Sage request failed:', e);
        }

        sageState.busy = false;
        hideTyping();

        if (!reply) reply = sageState.fallback;

        sageState.history.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);

        if (sageState.history.length > 12) {
          sageState.history = [sageState.history[0]].concat(sageState.history.slice(-11));
        }

        if (window.KTAudio && typeof window.KTAudio.coin === 'function' && reply !== sageState.fallback) {
          try { window.KTAudio.coin(); } catch (e) {}
        }
      }

      function wireSage() {
        var floatBtn = byId('sage-float-btn');
        var closeBtn = byId('sage-close-btn');
        var sendBtn = byId('sage-send-btn');
        var input = byId('sage-panel-input');
        var hintBtn = byId('sage-hint-btn');
        var explainBtn = byId('sage-explain-btn');
        var celebrateBtn = byId('sage-celebrate-btn');

        if (floatBtn && !floatBtn.dataset.bound) {
          floatBtn.dataset.bound = '1';
          floatBtn.addEventListener('click', togglePanel);
          floatBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            togglePanel();
          }, { passive: false });
        }

        if (closeBtn && !closeBtn.dataset.bound) {
          closeBtn.dataset.bound = '1';
          closeBtn.addEventListener('click', closePanel);
        }

        if (sendBtn && !sendBtn.dataset.bound) {
          sendBtn.dataset.bound = '1';
          sendBtn.addEventListener('click', function () {
            sendMessage();
          });
        }

        if (input && !input.dataset.bound) {
          input.dataset.bound = '1';
          input.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
              event.preventDefault();
              sendMessage();
            }
          });
        }

        if (hintBtn && !hintBtn.dataset.bound) {
          hintBtn.dataset.bound = '1';
          hintBtn.addEventListener('click', function () {
            sendMessage('Give me a hint for this question!');
          });
        }

        if (explainBtn && !explainBtn.dataset.bound) {
          explainBtn.dataset.bound = '1';
          explainBtn.addEventListener('click', function () {
            sendMessage("I'm confused. Can you explain this differently?");
          });
        }

        if (celebrateBtn && !celebrateBtn.dataset.bound) {
          celebrateBtn.dataset.bound = '1';
          celebrateBtn.addEventListener('click', function () {
            sendMessage('Celebrate with me!');
          });
        }
      }

      window.toggleSagePanel = togglePanel;
      window.sendSagePanel = sendMessage;

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', wireSage);
      } else {
        wireSage();
      }
    })();
  </script>
</body>
</html>
