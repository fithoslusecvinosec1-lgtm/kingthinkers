<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KingThinkers Lesson</title>

  <script src="/kingthinkers/kt-db.js"></script>
  <script src="/kingthinkers/kt-audio.js"></script>
  <script src="/kingthinkers/kt-sage-prompts.js"></script>
  <script src="/kingthinkers/lessons-egypt.js"></script>
  <script src="/kingthinkers/lesson-engine.js"></script>

  <style>
    body{margin:0;background:#0D0D1C;color:#fff;font-family:sans-serif}
    #lesson-content{padding:20px}
  </style>
</head>

<body>

<div id="lesson-content"></div>

<!-- ✅ SAGE BUTTON -->
<div id="sage-float-btn" style="
  position:fixed;bottom:80px;right:16px;
  width:60px;height:60px;border-radius:50%;
  background:#00C48C;color:#000;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;
">🤖</div>

<!-- ✅ SAGE PANEL -->
<div id="sage-panel" style="
  position:fixed;bottom:150px;right:16px;
  width:320px;background:#111;border-radius:12px;
  padding:12px;display:none;
">
  <div id="sage-messages" style="max-height:200px;overflow:auto;"></div>

  <input id="sage-input" placeholder="Ask Sage..." style="width:100%;margin-top:8px;" />
  <button id="sage-send">Send</button>
</div>

<script>
(function(){

  const state = {
    open:false,
    history:[]
  };

  const btn = document.getElementById('sage-float-btn');
  const panel = document.getElementById('sage-panel');
  const messages = document.getElementById('sage-messages');
  const input = document.getElementById('sage-input');
  const send = document.getElementById('sage-send');

  function render(){
    messages.innerHTML = '';
    state.history.forEach(m=>{
      const div = document.createElement('div');
      div.textContent = m.role + ': ' + m.content;
      messages.appendChild(div);
    });
    messages.scrollTop = messages.scrollHeight;
  }

  function toggle(){
    state.open = !state.open;
    panel.style.display = state.open ? 'block' : 'none';

    if(state.open && state.history.length === 0){
      state.history.push({
        role:'assistant',
        content:'Hey King 👑 ask me anything!'
      });
      render();
    }
  }

  async function sendMessage(text){
    if(!text) return;

    state.history.push({role:'user', content:text});
    render();

    let reply = 'Sage is offline';

    try{
      if(window.kt_sage){
        reply = await window.kt_sage(state.history, '');
      }
    }catch(e){
      console.warn(e);
    }

    state.history.push({role:'assistant', content:reply});
    render();
  }

  // ✅ EVENTS
  btn.addEventListener('click', toggle);

  send.addEventListener('click', ()=>{
    sendMessage(input.value);
    input.value='';
  });

  input.addEventListener('keydown', e=>{
    if(e.key === 'Enter'){
      sendMessage(input.value);
      input.value='';
    }
  });

  // ✅ GLOBAL EXPORT (fixes your error permanently)
  window.toggleSagePanel = toggle;
  window.sendSagePanel = sendMessage;

})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function(){
  if(window.KTLessonEngine){
    KTLessonEngine.init();
  }
});
</script>

</body>
</html>
