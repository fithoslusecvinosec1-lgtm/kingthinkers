<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KingThinkers — Warriors of the South</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#080816;--panel:#0F0F24;--card:#16163A;--card2:#1E1E45;
  --gold:#F5A800;--amber:#FF6B1A;--green:#00C48C;--red:#FF4757;
  --sky:#38BDF8;--lilac:#A78BFA;--white:#FFFFFF;--muted:#6060A0;
  --border:rgba(255,255,255,.07);
  --f-d:'Cinzel',Georgia,serif;--f-b:'Nunito',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:var(--f-b);overflow:hidden;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.s{position:absolute;border-radius:50%;background:white;animation:tw var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes tw{0%,100%{opacity:.15;}50%{opacity:.8;}}
.dunes{position:fixed;bottom:0;left:0;right:0;height:120px;pointer-events:none;z-index:1;background:linear-gradient(to top,#0D0A04 0%,transparent 100%);}
.dunes::before{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;
  background:radial-gradient(ellipse 60% 80px at 30% 100%,#1A1408 0%,transparent 70%),
             radial-gradient(ellipse 40% 60px at 70% 100%,#120F05 0%,transparent 70%);}
.game{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;max-width:860px;margin:0 auto;padding:0 0 16px;}
/* HUD */
.hud{display:flex;align-items:center;gap:12px;padding:10px 20px;background:rgba(8,8,22,.75);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.hud-logo{font-family:var(--f-d);font-size:13px;color:var(--gold);font-weight:700;white-space:nowrap;}
.hud-quest{border-radius:100px;padding:3px 12px;font-size:11px;font-weight:800;letter-spacing:.05em;white-space:nowrap;}
.hud-spacer{flex:1;}
.xp-track{width:90px;height:7px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;}
.xp-fill{height:100%;border-radius:100px;transition:width 1s ease;width:0%;}
.xp-num{font-size:11px;font-weight:900;}
.hud-crowns{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:900;color:var(--gold);}
.hud-grade{font-size:10px;font-weight:800;color:var(--muted);background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);border-radius:100px;padding:3px 10px;white-space:nowrap;}
.hud-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);color:rgba(255,255,255,.5);font-size:11px;font-weight:700;font-family:var(--f-b);padding:4px 10px;border-radius:100px;cursor:pointer;transition:all .2s;}
.hud-btn:hover{border-color:rgba(255,255,255,.2);color:var(--white);}
/* Phase bar */
.phase-bar{display:flex;padding:8px 20px;gap:5px;background:rgba(8,8,22,.5);flex-shrink:0;}
.phase-node{flex:1;height:4px;border-radius:100px;background:rgba(255,255,255,.1);transition:all .4s;}
.phase-node.done{background:var(--accent-color,var(--gold));}
.phase-node.active{animation:pulse-bar 1.5s ease-in-out infinite;}
@keyframes pulse-bar{0%,100%{opacity:.8;}50%{opacity:1;}}
/* Scene header */
.scene-header{padding:14px 20px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.scene-text{display:flex;flex-direction:column;gap:2px;}
.scene-eyebrow{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;}
.scene-title{font-family:var(--f-d);font-size:15px;color:var(--white);font-weight:700;}
.scene-icons{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.scene-icon{font-size:26px;}
.badge{border-radius:100px;padding:3px 10px;font-size:10px;font-weight:900;}
/* Sage */
.sage-strip{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;background:rgba(8,8,22,.4);flex-shrink:0;animation:sageIn .4s ease;}
@keyframes sageIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}
.sage-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:1px solid rgba(255,255,255,.1);}
.sage-name{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.sage-bubble{font-size:13px;color:rgba(255,255,255,.82);line-height:1.5;}
/* Content */
.content{flex:1;overflow-y:auto;padding:0 20px 80px;scroll-behavior:smooth;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}
/* Story */
.reading-scroll{padding:18px 0;}
.story-header{border-radius:16px;padding:14px 18px;margin-bottom:18px;border:1px solid rgba(255,255,255,.08);}
.story-eyebrow{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;}
.story-title{font-family:var(--f-d);font-size:19px;color:var(--white);font-weight:700;}
.story-body{font-size:15px;line-height:1.85;color:rgba(255,255,255,.88);}
.story-body p{margin-bottom:15px;}
.vocab-tip{border-bottom:2px dotted var(--gold);cursor:help;position:relative;}
.vocab-tip::after{content:attr(data-def);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:12px;color:rgba(255,255,255,.9);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:50;max-width:240px;white-space:normal;text-align:center;}
.vocab-tip:hover::after{opacity:1;}
.callout{background:rgba(245,168,0,.06);border:1px solid rgba(245,168,0,.15);border-radius:12px;padding:14px 16px;margin:12px 0;font-size:14px;line-height:1.65;}
.next-row{margin-top:22px;display:flex;justify-content:center;}
.btn-next{border:none;border-radius:14px;padding:13px 30px;font-family:var(--f-d);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.btn-next:hover{transform:translateY(-2px) scale(1.03);}
/* Questions */
.q-card{padding:18px 0;}
.q-standard{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;}
.q-text{font-size:16px;font-weight:800;color:var(--white);line-height:1.5;margin-bottom:11px;}
.math-context{font-size:14px;color:rgba(255,255,255,.75);line-height:1.6;margin-bottom:11px;padding:11px 15px;border-left:3px solid var(--accent-color,var(--gold));background:rgba(255,255,255,.03);border-radius:0 10px 10px 0;}
.math-display{text-align:center;padding:18px;background:var(--card);border:1px solid var(--border);border-radius:15px;margin-bottom:13px;font-family:var(--f-d);font-size:clamp(17px,4vw,26px);color:var(--gold);font-weight:700;letter-spacing:.04em;}
.q-hint{font-size:12px;color:var(--muted);background:rgba(255,255,255,.03);border-radius:9px;padding:7px 12px;margin-bottom:14px;border-left:2px solid rgba(255,255,255,.08);}
.choices{display:flex;flex-direction:column;gap:9px;}
.choice{display:flex;align-items:center;gap:13px;background:var(--card);border:2px solid var(--border);border-radius:13px;padding:13px 15px;cursor:pointer;transition:all .2s;text-align:left;width:100%;font-family:var(--f-b);}
.choice:hover:not(:disabled){border-color:rgba(245,168,0,.35);background:rgba(245,168,0,.05);}
.choice-letter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--muted);flex-shrink:0;}
.choice-text{font-size:14px;font-weight:700;color:rgba(255,255,255,.85);}
.choice.correct{border-color:var(--green);background:rgba(0,196,140,.1);}
.choice.correct .choice-letter{background:var(--green);color:#000;}
.choice.wrong{border-color:var(--red);background:rgba(255,71,87,.07);animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.math-input{background:var(--card);border:2px solid var(--border);border-radius:13px;padding:14px 18px;font-family:var(--f-d);font-size:22px;font-weight:700;color:var(--gold);text-align:center;width:100%;max-width:260px;outline:none;transition:border-color .2s;}
.math-input:focus{border-color:var(--gold);}
.fb{padding:11px 15px;border-radius:11px;font-size:13px;line-height:1.5;margin-top:10px;}
.correct-fb{background:rgba(0,196,140,.08);border:1px solid rgba(0,196,140,.2);color:rgba(255,255,255,.85);}
.wrong-fb{background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.18);color:rgba(255,255,255,.8);}
.q-feedback{margin-top:7px;}
/* Vocab match */
.vocab-match{display:flex;gap:12px;}
.vocab-col{flex:1;display:flex;flex-direction:column;gap:7px;}
.vocab-item{padding:11px 13px;background:var(--card);border:2px solid var(--border);border-radius:11px;font-size:13px;font-weight:700;color:rgba(255,255,255,.8);cursor:pointer;transition:all .2s;text-align:center;}
.vocab-item:hover:not(.matched):not(.selected){border-color:rgba(245,168,0,.35);background:rgba(245,168,0,.06);}
.vocab-item.selected{border-color:var(--sky);background:rgba(56,189,248,.1);color:var(--sky);}
.vocab-item.matched{cursor:default;}
.vocab-item.wrong-flash{animation:shake .3s ease;}
/* Complete screen */
.complete-screen{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,8,22,.96);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px;text-align:center;}
.complete-screen.show{display:flex;animation:fadeUp .6s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.complete-icon{font-size:68px;animation:bounce .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes bounce{from{transform:scale(0);}to{transform:scale(1);}}
.complete-title{font-family:var(--f-d);font-size:clamp(20px,5vw,32px);color:var(--gold);font-weight:900;}
.complete-stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.cs{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 18px;min-width:74px;}
.cs-val{font-family:var(--f-d);font-size:22px;font-weight:900;color:var(--gold);}
.cs-lbl{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;}
.complete-btns{display:flex;gap:11px;flex-wrap:wrap;justify-content:center;}
.btn-c{padding:12px 26px;border-radius:13px;font-family:var(--f-d);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.btn-c.primary{background:linear-gradient(135deg,var(--gold),var(--amber));border:none;color:#000;box-shadow:0 5px 20px rgba(245,168,0,.3);}
.btn-c.primary:hover{transform:translateY(-2px);box-shadow:0 9px 28px rgba(245,168,0,.45);}
.btn-c.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-c.ghost:hover{border-color:rgba(255,255,255,.2);color:var(--white);}
/* Fireworks */
.fw{position:fixed;pointer-events:none;z-index:250;animation:fly var(--dur,.8s) ease-out forwards var(--delay,0s);}
@keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.5);}100%{opacity:0;transform:translate(var(--fx,0),var(--fy,-120px)) scale(1.2);}}
/* Toast */
#toast{position:fixed;bottom:18px;right:18px;z-index:300;background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:11px 16px;display:flex;align-items:center;gap:9px;box-shadow:0 10px 36px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.175,.885,.32,1.275);max-width:270px;}
/* Math extras */
.math-highlight{background:rgba(0,196,140,.05);border:1px solid rgba(0,196,140,.15);border-radius:11px;padding:14px 16px;margin:12px 0;}

.phase-node.done{background:#FB7185;}
.phase-node.active{background:linear-gradient(90deg,#FB7185,#F5A800);}
</style>

<div class="dunes"></div>

<div class="game">
  <!-- HUD -->
  <div class="hud">

    <div class="hud-quest" style="background:rgba(251,113,133,.1);border:1px solid #FB718540;color:#FB7185;" id="hud-quest">Kingdom of Nubia · Warriors of the South</div>
    <div class="hud-spacer"></div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="background:linear-gradient(90deg,#FB7185,#F5A800);"></div></div>
    <div class="xp-num" id="xp-num" style="color:#FB7185;">60 XP</div>

  <div class="phase-bar" id="phase-bar">

  </div>

  <div class="scene-header" style="background:linear-gradient(135deg,rgba(251,113,133,.1),rgba(245,168,0,.07));border-bottom-color:#FB718522;">

      <div class="scene-eyebrow" style="color:#FB7185;">📜 Nubia — Mission 1</div>
      <div class="scene-title">Warriors of the South</div>

      <span class="badge" style="background:#FB718518;border:1px solid #FB718540;color:#FB7185;">3rd Grade</span>

  <!-- Sage -->
  <div class="sage-strip" id="sage-strip">
    <div class="sage-av" style="background:linear-gradient(135deg,#3A1A1A,#5A2A20);border-color:#FB718540;">🤖</div>
    <div>
      <div class="sage-name" style="color:#FB7185;">Sage · Your Guide</div>
      <div class="sage-bubble" id="sage-text">Loading your quest…</div>
    </div>
  </div>

  <!-- Content area -->
  <div class="content" id="content-area"></div>
</div>

<!-- Complete screen -->
<div class="complete-screen" id="complete-screen">
  <div class="complete-icon">⚔️</div>
  <div class="complete-title" style="color:#FB7185;">Warrior Scholar! 👑</div>
  <div class="complete-stats">
    <div class="cs"><div class="cs-val" id="f-xp" style="color:#FB7185;">0</div><div class="cs-lbl">XP Earned</div></div>
    <div class="cs"><div class="cs-val" id="f-cr" style="color:#FB7185;">0</div><div class="cs-lbl">Crowns</div></div>
    <div class="cs"><div class="cs-val" id="f-acc" style="color:#FB7185;">0%</div><div class="cs-lbl">Accuracy</div></div>
    <div class="cs"><div class="cs-val" id="f-time" style="color:#FB7185;">0s</div><div class="cs-lbl">Time</div></div>
  </div>
  <div class="complete-btns">
    <button class="btn-c primary" style="background:linear-gradient(135deg,#FB7185,#F5A800);" onclick="goMap()">Back to Kingdom Map →</button>

  </div>
</div>

<!-- Toast -->
<div id="toast"><span id="t-ico">✅</span>
  <div><div id="t-title" style="font-size:13px;font-weight:800;color:white;"></div>
       <div id="t-sub"  style="font-size:11px;color:var(--muted);margin-top:2px;"></div></div>
</div>

<script>
const LD = {
  "id": "n1",
  "worldId": "nubia",
  "type": "reading",
  "subject": "Reading",
  "title": "Warriors of the South",
  "grade": "3rd Grade",
  "worldName": "Kingdom of Nubia",
  "missionName": "Mission 1",
  "eyebrow": "📜 Nubia — Mission 1",
  "icon": "⚔️",
  "completeIcon": "⚔️",
  "completeTitle": "Warrior Scholar! 👑",
  "accentColor": "#FB7185",
  "accentColor2": "#F5A800",
  "hudQuestColor": "rgba(251,113,133,.1)",
  "headerBg": "linear-gradient(135deg,rgba(251,113,133,.1),rgba(245,168,0,.07))",
  "headerBorder": "rgba(251,113,133,.25)",
  "btnGradient": "linear-gradient(135deg,#FB7185,#F5A800)",
  "btnShadow": "0 6px 22px rgba(251,113,133,.3)",
  "sageAv1": "#3A1A1A",
  "sageAv2": "#5A2A20",
  "fireworks": [
    "🌟",
    "✨",
    "⚔️",
    "👑",
    "⭐",
    "🏹",
    "❤️",
    "🎊",
    "🛡️",
    "⚡"
  ],
  "story": "<p>South of Egypt, along the upper Nile River, lay the powerful kingdom of <span class=\"vocab-tip\" data-def=\"An ancient African kingdom south of Egypt, also called Kush, known for its warriors and gold\">Nubia</span>. For thousands of years, the Nubians and Egyptians traded, fought, and sometimes ruled each other. But the Nubians were never conquered in spirit — they were among the most skilled warriors and traders the ancient world had ever seen.</p>\n\n<p>Nubia's greatest strength was its <span class=\"vocab-tip\" data-def=\"Skilled fighters who shoot arrows with a bow — Nubians were world-famous for this skill\">archers</span>. In fact, ancient Egyptians called Nubia \"Ta-Seti,\" which means \"Land of the Bow.\" Nubian archers were so respected that Egyptian pharaohs hired them as elite soldiers to guard the royal palace.</p>\n\n<p>Young Amara practiced with his bow every morning before breakfast. His grandmother, Queen Tiwa, watched from the courtyard. \"Your arrow must know the target before it flies,\" she told him. \"A warrior who shoots in anger misses. A warrior who shoots with <span class=\"vocab-tip\" data-def=\"The ability to stay calm and wait for the right moment\">patience</span> never misses.\"</p>\n\n<p>Amara lowered his bow and thought about her words. \"But grandmother, what if the enemy attacks fast?\" The queen smiled. \"Then your preparation today is your protection tomorrow. Every morning you practice, you are building a wall that no arrow can break.\"</p>\n\n<p>Beyond their military skill, the Nubians were master traders. Gold, ivory, ebony wood, and exotic animals flowed north from Nubia into Egypt and beyond. Nubian merchants traveled dangerous routes and negotiated skillfully, making their kingdom <span class=\"vocab-tip\" data-def=\"Very wealthy; having a lot of valuable resources\">prosperous</span> for centuries.</p>\n\n<p>Amara loosed three arrows in quick <span class=\"vocab-tip\" data-def=\"A series of actions done one right after another without stopping\">succession</span>. All three hit the center of the target. Queen Tiwa nodded. \"Now you understand,\" she said quietly. \"Strength is built before the battle begins.\"</p>",
  "sageMessages": [
    "<strong>Welcome to Nubia, King! ⚔️</strong> You've journeyed south of Egypt to the mighty kingdom of Nubia — Land of the Bow. Read this story about a young Nubian warrior learning from his grandmother. Let's go!",
    "<strong>First question! 📜</strong> The answer is right in the passage — read it closely and you'll find it!",
    "<strong>Excellent work! 🏹</strong> This question asks WHY something happened. Look for the cause and what it led to.",
    "<strong>Word warrior! 🔍</strong> This question is about vocabulary. Use the context around the word to figure it out!",
    "<strong>Vocab challenge! 📚</strong> Match these Nubian warrior words to their meanings. You've got this!",
    "<strong>Final question! 👑</strong> This one asks about the big message of the story. What lesson is Queen Tiwa teaching?",
    "<strong>Warrior Scholar! 🌟</strong> You've conquered Nubia's first challenge like a true champion!"
  ],
  "questions": [
    {
      "type": "mcq",
      "standard": "RI.3.1",
      "question": "What did ancient Egyptians call Nubia, and what did that name mean?",
      "hint": "🔍 Look in the second paragraph. The passage gives both the Egyptian name AND its meaning.",
      "choices": [
        {
          "text": "\"Land of the Bow\" — because of Nubia's famous archers",
          "correct": true
        },
        {
          "text": "\"Land of Gold\" — because Nubia had enormous gold mines",
          "correct": false
        },
        {
          "text": "\"Land of the Pharaoh\" — because Egypt ruled Nubia completely",
          "correct": false
        },
        {
          "text": "\"Land of Arrows\" — because Nubians invented the arrow",
          "correct": false
        }
      ],
      "correctFeedback": "Exactly! Egyptian pharaohs called Nubia 'Ta-Seti' — meaning 'Land of the Bow.' This showed how deeply they respected Nubian archers! 🏹",
      "wrongFeedback": "Go back to the second paragraph. It gives the Egyptian name for Nubia AND tells you exactly what that name means. Both pieces are right there!",
      "xpReward": 25,
      "crownReward": 1
    },
    {
      "type": "mcq",
      "standard": "RI.3.3",
      "question": "According to Queen Tiwa, WHY is daily practice so important for a warrior?",
      "hint": "💭 Look at what the Queen says directly to Amara. She gives a specific reason — almost like a proverb.",
      "choices": [
        {
          "text": "Because the enemy might attack at any moment and you must always be ready",
          "correct": false

let phase=0,baseXP=0,baseCrowns=0,sessionXP=0,sessionCrowns=0,correct=0,totalQs=0,startTime=Date.now(),
    vocabSel={word:null,def:null},vocabDone=0;

const LESSON_DASHBOARD_URL = 'kingthinkers-dashboard.html';

function getActiveLessonCode(){
  if(typeof kt_getActiveCode === 'function') return kt_getActiveCode();
  return localStorage.getItem('kt_active_code');
}

function getActiveStudentSnapshot(){
  const code = getActiveLessonCode();
  if(!code) return {};
  try {
    return JSON.parse(localStorage.getItem('kt_student_' + code) || 'null') || {};
  } catch (err) {
    console.warn('failed to load active student snapshot', err);
    return {};
  }
}

function updateLessonHud(){
  const totalXP = baseXP + sessionXP;
  const totalCrowns = baseCrowns + sessionCrowns;
  const pct=Math.min(100,Math.round((sessionXP/200)*100));
  const f=document.getElementById('xp-fill');
  if(f) f.style.width=pct+'%';
  const e=document.getElementById('xp-num');
  if(e) e.textContent=totalXP+' XP';
  const c=document.getElementById('hud-crowns');
  if(c) c.textContent='👑 '+totalCrowns;
}

function resetLessonState(){
  const student = getActiveStudentSnapshot();
  phase=0;baseXP=typeof student.xp==='number'?student.xp:0;baseCrowns=typeof student.crowns==='number'?student.crowns:0;
  sessionXP=0;sessionCrowns=0;correct=0;totalQs=0;startTime=Date.now();
  vocabSel={word:null,def:null};vocabDone=0;
  updateLessonHud();
}

function lessonAudioCall(method){
  if(!window.KTAudio || typeof KTAudio[method] !== 'function') return null;
  try {
    return KTAudio[method].apply(KTAudio, Array.prototype.slice.call(arguments, 1));
  } catch (err) {
    console.warn('lesson audio failed', method, err);
    return null;
  }
}
function lessonAudioCorrect(){ return lessonAudioCall('correct'); }
function lessonAudioWrong(){ return lessonAudioCall('wrong'); }
function lessonAudioCoin(){ return lessonAudioCall('coin'); }
function lessonAudioQuestComplete(){ return lessonAudioCall('questComplete'); }
function lessonAudioTap(){ return lessonAudioCall('tap'); }
function lessonAudioInit(){ return lessonAudioCall('init'); }
function lessonAudioStartMusic(){ return lessonAudioCall('startMusic'); }
function lessonAudioToggleMute(){ return lessonAudioCall('toggleMute'); }

function safeNavigateToDashboard(delay){
  const ms = typeof delay === 'number' ? delay : 0;
  window.setTimeout(function(){
    window.location.href = LESSON_DASHBOARD_URL;
  }, Math.max(0, ms));
}

function initializeLessonAudioGuards(){
  function onFirstGesture(){
    lessonAudioInit();

  }
  document.addEventListener('touchstart', onFirstGesture, { once: true });
  document.addEventListener('click', onFirstGesture, { once: true });
}


function bootLesson(){
  resetLessonState();
  // Stars
  const c=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='s';
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*80}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
  renderPhase();
}

function renderPhase(){
  const area=document.getElementById('content-area');
  area.innerHTML='';
  updatePhaseBar();
  setSage(LD.sageMessages[phase]);
  if(phase===0){
    if(LD.type==='reading') renderReading(area);
    else renderMathIntro(area);
  } else if(phase>=1&&phase<=3){
    if(LD.type==='reading') renderQuestion(area,LD.questions[phase-1]);
    else renderMathProblem(area,LD.problems[phase-1]);
  } else if(phase===4){
    renderVocab(area);
  } else if(phase===5){
    if(LD.type==='reading') renderQuestion(area,LD.questions[3]);
    else renderMathProblem(area,LD.problems[3]);
  } else {
    showComplete();
  }
  area.scrollTop=0;
}

function nextPhase(){phase++;renderPhase();}

function updatePhaseBar(){
  document.querySelectorAll('.phase-node').forEach((n,i)=>{
    n.classList.remove('active','done');
    if(i===phase) n.classList.add('active');
    else if(i<phase) n.classList.add('done');
  });
}

function setSage(html){

  const strip=document.getElementById('sage-strip');

}

function gainXP(n){

function gainCrowns(n){

function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');}

function renderQuestion(area,q){
  const div=document.createElement('div');div.className='q-card';
  div.innerHTML=`
    <div class="q-standard" style="color:${LD.accentColor};">${q.standard}</div>
    <div class="q-text">${q.question}</div>
    <div class="q-hint">${q.hint}</div>
    <div class="choices" id="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice" data-correct="${c.correct}" data-cfb="${escQ(q.correctFeedback)}" data-wfb="${escQ(q.wrongFeedback)}" data-xp="${q.xpReward}" data-cr="${q.crownReward}" onclick="answerMCQ(this)">
          <span class="choice-letter">${['A','B','C','D'][i]}</span>
          <span class="choice-text">${c.text}</span>
        </button>`).join('')}
    </div>
    <div class="q-feedback" id="q-feedback" style="display:none;"></div>`;
  area.appendChild(div);
}

function answerMCQ(btn){
  const isCorrect=btn.dataset.correct==='true';
  const cfb=btn.dataset.cfb, wfb=btn.dataset.wfb;
  const xpR=parseInt(btn.dataset.xp), crR=parseInt(btn.dataset.cr);
  document.querySelectorAll('.choice').forEach(c=>c.disabled=true);
  const fb=document.getElementById('q-feedback');
  fb.style.display='block';
  if(isCorrect){
    btn.classList.add('correct');
    gainXP(xpR);gainCrowns(crR);
    fb.innerHTML=`<div class="fb correct-fb">✅ ${cfb}</div>`;
    lessonAudioCorrect(); showToast('👑','Correct!',`+${xpR} XP · +${crR} Crown${crR>1?'s':''}`);
    setTimeout(nextPhase,1800);
  } else {
    btn.classList.add('wrong');
    fb.innerHTML=`<div class="fb wrong-fb">💭 ${wfb}</div>`;
    lessonAudioWrong(); showToast('🤖','Not quite!','Think it through, King!');
    setTimeout(()=>{
      document.querySelectorAll('.choice').forEach(c=>{c.disabled=false;c.classList.remove('wrong','correct');});
      fb.style.display='none';
    },2200);
  }
}

    // Store answer on window for submitInput
    window._mathAnswer={answer:p.answer,cfb:p.correctFeedback,wfb:p.wrongFeedback,xp:p.xpReward,cr:p.crownReward};
  } else {
    div.innerHTML=`
      <div class="q-standard" style="color:${LD.accentColor};">${p.standard}</div>
      <div class="math-context" style="border-left-color:${LD.accentColor};">${p.context}</div>

function submitInput(){
  const m=window._mathAnswer;
  const input=document.getElementById('math-input');
  const val=input.value.trim().replace(/,/g,'');
  const ok=val===String(m.answer)||parseFloat(val)===parseFloat(m.answer);

    gainXP(m.xp);gainCrowns(m.cr);

}

      </div>

        ${defs.map(p=>`<div class="vocab-item" id="vd-${p.id}" onclick="selVocab('d','${p.id}')">${p.def}</div>`).join('')}

function selVocab(type,id){
  const el=document.getElementById((type==='w'?'vw-':'vd-')+id);
  if(!el||el.classList.contains('matched')) return;
  if(type==='w'){
    document.querySelectorAll('.vocab-item').forEach(e=>{if(!e.classList.contains('matched'))e.classList.remove('selected');});
    vocabSel.word=id; el.classList.add('selected');
  } else {
    document.querySelectorAll('#vocab-match .vocab-col:last-child .vocab-item').forEach(e=>{if(!e.classList.contains('matched'))e.classList.remove('selected');});
    vocabSel.def=id; el.classList.add('selected');
  }
  if(vocabSel.word&&vocabSel.def){
    const wEl=document.getElementById('vw-'+vocabSel.word);
    const dEl=document.getElementById('vd-'+vocabSel.def);
    if(vocabSel.word===vocabSel.def){
      const color=LD.vocabPairs.find(p=>p.id===vocabSel.word)?.color||LD.accentColor;
      [wEl,dEl].forEach(e=>{e.classList.add('matched');e.style.borderColor=color;e.style.color=color;e.style.background=color+'18';});
      gainXP(10);gainCrowns(1);lessonAudioCoin(); showToast('✅','Matched!','+10 XP');
      vocabSel={word:null,def:null};
      vocabDone++;
      if(vocabDone>=LD.vocabPairs.length){
        setTimeout(()=>{
          document.getElementById('vocab-match').style.opacity='0.4';
          document.getElementById('vocab-done').style.display='block';
        },500);
      }
    } else {
      [wEl,dEl].forEach(e=>e.classList.add('wrong-flash'));
      showToast('💭','Not a match','Try a different definition!');
      setTimeout(()=>{[wEl,dEl].forEach(e=>{e.classList.remove('wrong-flash','selected');});vocabSel={word:null,def:null};},700);
    }
  }
}

// ── COMPLETE ──────────────────────────────────────────────────────────────────
async function completeActiveMission(acc, lessonBonusXp) {
  try {
    const active = JSON.parse(localStorage.getItem('kt_active_mission') || 'null');
    if (!active || !active.missionId) return null;

    const persistedMissionXp = typeof active.xp === 'number' ? active.xp : 0;
    const signal = {
      missionId: active.missionId,
      worldId: active.worldId,
      xp: persistedMissionXp,
      sessionXp: sessionXP,
      bonusXp: typeof lessonBonusXp === 'number' ? lessonBonusXp : 0,
      accuracy: acc,
      completedAt: Date.now()
    };

    localStorage.setItem('kt_mission_completed', JSON.stringify(signal));
    localStorage.removeItem('kt_active_mission');

    const code = getActiveLessonCode();
    let serverResult = null;
    if (code && code !== 'demo') {
      serverResult = await db_completeLesson(code, active.missionId, persistedMissionXp);
      if (serverResult) {
        if ((typeof serverResult.xp === 'number' || typeof serverResult.crowns === 'number') && code) {
          const student = JSON.parse(localStorage.getItem('kt_student_' + code) || 'null') || {};
          if (typeof serverResult.xp === 'number') student.xp = serverResult.xp;
          if (typeof serverResult.crowns === 'number') student.crowns = serverResult.crowns;
          localStorage.setItem('kt_student_' + code, JSON.stringify(student));
        }
        if (serverResult.missions && code) {
          localStorage.setItem('kt_quest_progress_' + code, JSON.stringify(serverResult.missions));
        }
      }
    }

    return {
      active: active,
      persistedMissionXp: persistedMissionXp,
      sessionXp: sessionXP,
      lessonBonusXp: typeof lessonBonusXp === 'number' ? lessonBonusXp : 0,
      serverResult: serverResult
    };
  } catch (e) {
    console.warn('completeActiveMission failed', e);
    return null;
  }
}

async function showComplete() { lessonAudioQuestComplete();
  const elapsed=Math.round((Date.now()-startTime)/1000);
  const acc=totalQs>0?Math.round((correct/totalQs)*100):100;
  const lessonBonusXp = acc===100?50:acc>=75?25:0;
  const lessonXpEarned = sessionXP;
  const totalLessonXpEarned = lessonXpEarned + lessonBonusXp;

  await completeActiveMission(acc, lessonBonusXp);

  if (lessonBonusXp) gainXP(lessonBonusXp);
  document.getElementById('f-xp').textContent=totalLessonXpEarned;
  document.getElementById('f-cr').textContent=sessionCrowns;
  document.getElementById('f-acc').textContent=acc+'%';
  document.getElementById('f-time').textContent=elapsed+'s';
  document.getElementById('complete-screen').classList.add('show');
  launch();

  scheduleMapReturn();
}

var sagePanelOpen = false;
var lessonSageInitialized = false;
var LESSON_SAGE_FALLBACK = 'Sage is offline, King.';

function getLessonSageGreeting() {
  return 'Hey King! I'm Sage. Ask for a hint or a quick explanation. 👑';
}

function getLessonSagePhaseLabel() {
  if (typeof phase !== 'number') return 'lesson';
  if (phase === 0) return 'intro';
  if (phase >= 1 && phase <= 3) return 'question ' + phase;
  if (phase === 4) return 'checkpoint';
  if (phase === 5) return 'question 4';
  if (phase >= 6) return 'complete';
  return 'lesson';
}

function getLessonSageQuestionIndex() {
  if (typeof phase !== 'number') return -1;
  if (phase >= 1 && phase <= 3) return phase - 1;
  if (phase === 5) return 3;
  return -1;
}

function getLessonSageQuestionData() {
  if (typeof LD === 'undefined') return null;
  var index = getLessonSageQuestionIndex();
  if (index < 0) return null;
  if (LD.type === 'reading' && LD.questions && LD.questions[index]) return LD.questions[index];
  if (LD.problems && LD.problems[index]) return LD.problems[index];
  return null;
}

function getLessonSageQuestionText() {
  var item = getLessonSageQuestionData();
  if (!item) return '';
  return item.question || item.problem || '';
}

function getLessonSageAnswerChoices() {
  var item = getLessonSageQuestionData();
  if (!item || !item.choices || !item.choices.length) return [];
  return item.choices.map(function(choice) {
    return choice && choice.text ? String(choice.text).trim() : '';
  }).filter(Boolean);
}

function getLessonSageSubject() {
  if (typeof LD === 'undefined') return 'lesson';
  return LD.type === 'reading' ? 'reading' : 'math';
}

function hasLessonSageWrongAttempt() {
  return !!document.querySelector('.choice.wrong, .wrong-fb, .wrong-flash');
}

function getLessonSageMode(message) {
  return KTSagePrompts.detectSageMode(message, {
    inLesson: true,
    studentAlreadyWrong: hasLessonSageWrongAttempt()
  });
}

function getLessonSageContext(message) {
  return {
    lessonTitle: document.title.replace('KingThinkers — ', ''),
    subject: getLessonSageSubject(),
    currentPhase: getLessonSagePhaseLabel(),
    currentQuestion: getLessonSageQuestionText(),
    answerChoices: getLessonSageAnswerChoices(),
    studentAlreadyWrong: hasLessonSageWrongAttempt(),
    mode: getLessonSageMode(message)
  };
}

function createLessonSageMessage(role, text) {
  var div = document.createElement('div');
  div.className = role === 'user' ? 'sp-msg-user' : 'sp-msg-ai';
  div.textContent = text == null ? '' : String(text);
  return div;
}

function createLessonSageTyping() {
  var div = document.createElement('div');
  div.className = 'sp-msg-ai';
  div.id = 'sage-panel-typing';
  div.textContent = 'Sage is thinking…';
  return div;
}

function renderLessonSageHistory() {
  var msgs = document.getElementById('sage-panel-messages');
  if (!msgs) return;
  msgs.replaceChildren();
  for (var i = 0; i < sagePanelHistory.length; i++) {
    msgs.appendChild(createLessonSageMessage(sagePanelHistory[i].role, sagePanelHistory[i].content));
  }
  if (sagePanelBusy) msgs.appendChild(createLessonSageTyping());
  msgs.scrollTop = msgs.scrollHeight;
}

function appendLessonSageMessage(role, text) {
  var msgs = document.getElementById('sage-panel-messages');
  var node = createLessonSageMessage(role, text);
  if (msgs) {
    msgs.appendChild(node);
    msgs.scrollTop = msgs.scrollHeight;
  }
}

function showLessonSageTyping() {
  var msgs = document.getElementById('sage-panel-messages');
  if (!msgs || document.getElementById('sage-panel-typing')) return;
  msgs.appendChild(createLessonSageTyping());
  msgs.scrollTop = msgs.scrollHeight;
}

function removeLessonSageTyping() {
  var typing = document.getElementById('sage-panel-typing');
  if (typing) typing.remove();
}

function ensureLessonSageSession() {
  if (lessonSageInitialized) {
    renderLessonSageHistory();
    return;
  }
  lessonSageInitialized = true;
  sagePanelHistory = [{ role: 'assistant', content: getLessonSageGreeting() }];
  renderLessonSageHistory();
}

window.__toggleSagePanelImpl = function toggleSagePanel() {
  sagePanelOpen = !sagePanelOpen;
  var panel = document.getElementById('sage-panel');
  if (!panel) return;
  panel.style.display = sagePanelOpen ? 'block' : 'none';
  if (sagePanelOpen) ensureLessonSageSession();
}

window.__sendSagePanelImpl = async function sendSagePanel(prefill) {
  if (sagePanelBusy) return;

  var input = document.getElementById('sage-panel-input');
  var text = prefill || (input ? input.value.trim() : '');
  if (!text) return;
  if (input) input.value = '';

  lessonAudioTap();
  ensureLessonSageSession();

  var cleanText = String(text).trim();
  sagePanelHistory.push({ role: 'user', content: cleanText });
  appendLessonSageMessage('user', cleanText);

  sagePanelBusy = true;
  showLessonSageTyping();

  var reply = null;
  try {
    var ctx = getLessonSageContext(cleanText);
    var systemWithCtx = KTSagePrompts.buildLessonSagePromptFromContext(cleanText, ctx);
    reply = await kt_sage(sagePanelHistory, systemWithCtx);
  } catch (e) {
    console.warn('Sage failed:', e);
  }

  sagePanelBusy = false;
  removeLessonSageTyping();

  if (!reply) reply = LESSON_SAGE_FALLBACK;
  sagePanelHistory.push({ role: 'assistant', content: reply });
  appendLessonSageMessage('assistant', reply);

  if (sagePanelHistory.length > 12) {
    sagePanelHistory = [sagePanelHistory[0]].concat(sagePanelHistory.slice(-11));
  }

  if (reply !== LESSON_SAGE_FALLBACK) lessonAudioCoin();
}
</script>
